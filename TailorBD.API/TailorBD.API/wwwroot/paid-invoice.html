<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Paid Invoices - TailorBD" data-bn="পরিশোধিত ইনভয়েস - TailorBD">পরিশোধিত ইনভয়েস - TailorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <style>
        .invoice-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(102,126,234,.10);
            padding: 24px;
            margin-bottom: 20px;
        }
        .invoice-card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .invoice-card .card-title i { color: #16a34a; }

        .inv-table { width: 100%; border-collapse: collapse; }
        .inv-table thead th {
            background: #f8fafc;
            padding: 10px 12px;
            font-size: .8rem;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }
        .inv-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
        .inv-table tbody tr:hover { background: #f8fafc; }
        .inv-table tbody td { padding: 10px 12px; font-size: .85rem; color: #334155; vertical-align: middle; }

        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; color: #cbd5e1; }

        .btn-detail {
            background: #667eea; color: #fff; border: none; border-radius: 6px;
            padding: 5px 12px; font-size: .78rem; cursor: pointer; font-weight: 500;
        }
        .btn-detail:hover { background: #5a68c9; color: #fff; }

        .detail-row td { background: #f8fafc; padding: 12px 20px !important; }
        .detail-table { width: 100%; margin: 0; border-collapse: collapse; }
        .detail-table th {
            padding: 5px 10px;
            font-size: .75rem;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }
        .detail-table td { padding: 5px 10px; font-size: .82rem; border-bottom: 1px solid #f1f5f9; }
        .detail-total { font-weight: 700; color: #16a34a; }

        .inv-count-badge {
            background: #e0e7ff;
            color: #4338ca;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .72rem;
        }

        .sk-row { height: 44px; background: #f1f5f9; border-radius: 6px; margin-bottom: 8px; animation: skPulse 1.4s ease-in-out infinite; }
        @keyframes skPulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

        .btn-print {
            background: #16a34a; color: #fff; border: none; border-radius: 6px;
            padding: 5px 12px; font-size: .78rem; cursor: pointer; font-weight: 500; margin-left:6px;
        }
        .btn-print:hover { background: #15803d; color: #fff; }

        /* ── Money Receipt Print Area ── */
        #receiptPrintArea { display:none; }

        @media print {
            @page { margin: 6mm 8mm; }
            body > * { display: none !important; }
            #receiptPrintArea {
                display: block !important;
                position: fixed;
                top: 0; left: 0;
                width: 100%;
                background: #fff;
                z-index: 99999;
                padding: 0;
            }
        }

        /* ═══════════════════════════════════
           Professional Receipt Design
        ═══════════════════════════════════ */
        .rcpt {
            max-width: 720px;
            margin: 0 auto;
            font-family: 'Poppins', Arial, sans-serif;
            background: #fff;
            color: #1e293b;
            font-size: .82rem;
        }

        /* Top logo bar */
        .rcpt-logo-bar {
            padding: 16px 24px 10px;
            border-bottom: 3px solid #16a34a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rcpt-logo-name { font-size: 1.35rem; font-weight: 800; color: #1e293b; line-height: 1.1; }
        .rcpt-logo-tag  { font-size: .68rem; color: #64748b; }

        /* Receipt banner */
        .rcpt-banner {
            display: flex;
            align-items: stretch;
            margin-bottom: 0;
        }
        .rcpt-banner-left  { background: #111827; flex: 1; min-height: 52px; }
        .rcpt-banner-title {
            background: #fff;
            padding: 8px 22px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: 4px;
            display: flex; align-items: center;
        }
        .rcpt-banner-right { background: #111827; width: 52px; }

        /* Service charge subtitle */
        .rcpt-service-sub {
            background: #f0fdf4;
            text-align: center;
            padding: 4px 0;
            font-size: .7rem;
            font-weight: 600;
            color: #15803d;
            letter-spacing: .8px;
            border-bottom: 1px solid #d1fae5;
        }

        /* Two-column info */
        .rcpt-info {
            display: flex;
            gap: 0;
            padding: 14px 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .rcpt-info-left  { flex: 1; border-right: 1px solid #e2e8f0; padding-right: 20px; }
        .rcpt-info-right { flex: 1; padding-left: 20px; text-align: right; }
        .rcpt-info-head {
            font-size: .75rem; font-weight: 800;
            color: #1e293b; border-bottom: 2px solid #1e293b;
            padding-bottom: 4px; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .rcpt-info-right .rcpt-info-head { text-align: right; }
        .rcpt-info-line {
            font-size: .77rem; color: #475569;
            margin-bottom: 3px; display: flex; align-items: flex-start; gap: 5px;
        }
        .rcpt-info-right .rcpt-info-line { justify-content: flex-end; }
        .rcpt-info-line i { color: #16a34a; font-size: .72rem; margin-top: 2px; flex-shrink: 0; }
        .rcpt-receipt-no {
            font-size: 1.0rem; font-weight: 800; color: #1e293b;
            margin-bottom: 8px;
        }

        /* Invoice table */
        .rcpt-table { width: 100%; border-collapse: collapse; margin: 0; }
        .rcpt-table thead th {
            background: #1e293b;
            color: #fff;
            padding: 8px 12px;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap;
        }
        .rcpt-table thead th:last-child,
        .rcpt-table thead th:nth-child(3),
        .rcpt-table thead th:nth-child(4) { text-align: right; }
        .rcpt-table tbody td {
            padding: 7px 12px;
            font-size: .78rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            white-space: nowrap;
        }
        .rcpt-table tbody td:last-child,
        .rcpt-table tbody td:nth-child(3),
        .rcpt-table tbody td:nth-child(4) { text-align: right; color: #ea580c; font-weight: 600; }
        .rcpt-table tbody td:nth-child(1) { color: #16a34a; font-weight: 700; }
        .rcpt-table tbody tr:nth-child(even) { background: #f8fafc; }
        .rcpt-table tfoot td {
            padding: 7px 12px;
            font-size: .78rem;
            font-weight: 700;
            border-top: 2px solid #1e293b;
            text-align: right;
            color: #1e293b;
        }

        /* Bottom section */
        .rcpt-bottom {
            display: flex;
            gap: 0;
            padding: 14px 24px 10px;
            align-items: flex-start;
        }
        .rcpt-bottom-left  { flex: 1; padding-right: 20px; }
        .rcpt-bottom-right { width: 220px; flex-shrink: 0; }

        .rcpt-thankyou {
            font-size: .82rem; font-weight: 700; color: #16a34a;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .rcpt-method-label { font-size: .72rem; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .rcpt-method-item {
            display: flex; align-items: center; gap: 5px;
            font-size: .75rem; color: #475569; margin-bottom: 3px;
        }
        .rcpt-method-item i { color: #667eea; width: 14px; text-align: center; }

        /* Summary table */
        .rcpt-summary { width: 100%; border-collapse: collapse; }
        .rcpt-summary tr td {
            padding: 5px 10px;
            font-size: .78rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .rcpt-summary tr td:last-child { text-align: right; font-weight: 600; }
        .rcpt-summary .rcpt-sum-total {
            background: #16a34a; color: #fff; font-weight: 800; font-size: .85rem;
        }
        .rcpt-summary .rcpt-sum-total td { border-bottom: none; padding: 7px 10px; }

        /* Signature */
        .rcpt-sig {
            text-align: right;
            padding: 10px 24px 0;
            border-top: 1px dashed #e2e8f0;
            margin: 4px 24px 0;
        }
        .rcpt-sig-line { width: 130px; border-top: 1.5px solid #94a3b8; margin: 0 0 3px auto; }
        .rcpt-sig-label { font-size: .68rem; color: #64748b; }

        /* Footer bar */
        .rcpt-footer-bar {
            background: #374151;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            font-size: .7rem;
            margin-top: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .rcpt-footer-bar span { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div id="app-sidebar"></div>
    <main class="main-content" id="mainContent">
        <div id="app-navbar"></div>
        <div class="dashboard-content">
            <div class="invoice-card">
                <div class="card-title">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span class="lang-content" data-en="Paid Invoices" data-bn="পরিশোধিত ইনভয়েস">পরিশোধিত ইনভয়েস</span>
                </div>

                <div id="skeletonLoader">
                    <div class="sk-row"></div><div class="sk-row"></div><div class="sk-row"></div>
                </div>

                <div style="overflow-x:auto; display:none;" id="tableWrap">
                    <table class="inv-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th><span class="lang-content" data-en="Paid Date" data-bn="পরিশোধের তারিখ">পরিশোধের তারিখ</span></th>
                                <th><span class="lang-content" data-en="Total Paid" data-bn="মোট পরিশোধ">মোট পরিশোধ</span></th>
                                <th><span class="lang-content" data-en="Method" data-bn="পদ্ধতি">পদ্ধতি</span></th>
                                <th><span class="lang-content" data-en="Collected By" data-bn="গ্রহণকারী">গ্রহণকারী</span></th>
                                <th><span class="lang-content" data-en="Invoices" data-bn="ইনভয়েস">ইনভয়েস</span></th>
                                <th><span class="lang-content" data-en="Details" data-bn="বিস্তারিত">বিস্তারিত</span></th>
                            </tr>
                        </thead>
                        <tbody id="invoiceBody"></tbody>
                    </table>
                </div>

                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="fas fa-file-invoice"></i>
                    <p class="lang-content" data-en="No paid invoices found." data-bn="কোনো পরিশোধিত ইনভয়েস নেই।">কোনো পরিশোধিত ইনভয়েস নেই।</p>
                </div>
            </div>
        </div>
    </main>

    <div id="app-modals"></div>

    <!-- Money Receipt Print Area -->
    <div id="receiptPrintArea"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js?v=2.1.7"></script>
    <script>
    var _paymentGroups = [];
    var _institutionInfo = {};

    $(document).ready(function() {
        var institutionId = sessionStorage.getItem('institutionId');
        if (!institutionId) { window.location.href = '/login.html'; return; }
        loadInstitutionInfo(institutionId);
        loadPaymentSummary(institutionId);
    });

    function loadInstitutionInfo(institutionId) {
        $.get('/api/institution/' + institutionId).done(function(res) {
            if (res.success && res.data) _institutionInfo = res.data;
        });
    }

    function loadPaymentSummary(institutionId) {
        $.ajax({
            url: '/api/invoice/payment-summary?institutionId=' + institutionId,
            method: 'GET',
            success: function(r) {
                $('#skeletonLoader').hide();
                if (r.success && r.data && r.data.length) {
                    _paymentGroups = r.data;
                    renderPayments(r.data);
                    $('#tableWrap').show();
                } else {
                    $('#emptyState').show();
                }
            },
            error: function() {
                $('#skeletonLoader').hide();
                $('#emptyState').show();
            }
        });
    }

    var fmt = function(n) { return (n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 }); };
    var fmtDate = function(d) {
        if (!d) return '-';
        var dt = new Date(d);
        return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    function renderPayments(groups) {
        var $body = $('#invoiceBody');
        $body.empty();

        groups.forEach(function(g, idx) {
            var amt = g.totalAmount || 0;
            var invCount = g.invoices ? g.invoices.length : 0;

            var row = '<tr>' +
                '<td>' + (idx + 1) + '</td>' +
                '<td>' + fmtDate(g.paidDate) + '</td>' +
                '<td><strong style="color:#16a34a;">৳' + fmt(amt) + '</strong></td>' +
                '<td>' + (g.payment_Method || '-') + '</td>' +
                '<td>' + (g.collected_By || '-') + '</td>' +
                '<td><span class="inv-count-badge">' + invCount + ' ইনভয়েস</span></td>' +
                '<td>' +
                  '<button class="btn-detail" onclick="toggleDetail(this,' + idx + ')"><i class="fas fa-eye me-1"></i><span class="lang-content" data-en="View" data-bn="দেখুন">দেখুন</span></button>' +
                  '<button class="btn-print" onclick="printReceipt(' + idx + ')"><i class="fas fa-print me-1"></i>প্রিন্ট</button>' +
                '</td>' +
                '</tr>';
            $body.append(row);
        });
    }

    function toggleDetail(btn, groupIdx) {
        var $tr = $(btn).closest('tr');
        var $next = $tr.next('.detail-row');
        if ($next.length) {
            $next.remove();
            return;
        }

        var g = _paymentGroups[groupIdx];
        if (!g || !g.invoices || !g.invoices.length) {
            $tr.after('<tr class="detail-row"><td colspan="7" style="color:#94a3b8; font-size:.82rem; padding:12px 20px;">কোনো ইনভয়েস তথ্য নেই</td></tr>');
            return;
        }

        var html = '<tr class="detail-row"><td colspan="7"><div style="padding:4px 0;">';
        html += '<table class="detail-table"><thead><tr>' +
            '<th>ইনভয়েসের বিষয়</th>' +
            '<th>ইসুয়ের তারিখ</th>' +
            '<th>শেষ তারিখ</th>' +
            '<th>মোট</th>' +
            '<th>ছাড়</th>' +
            '<th>পরিশোধ</th>' +
            '</tr></thead><tbody>';

        var totalPaidInGroup = 0;
        g.invoices.forEach(function(inv) {
            totalPaidInGroup += (inv.paidAmount || 0);
            html += '<tr>' +
                '<td>' + (inv.invoice_For || '-') + '</td>' +
                '<td>' + fmtDate(inv.issuDate) + '</td>' +
                '<td>' + fmtDate(inv.endDate) + '</td>' +
                '<td>৳' + fmt(inv.invoiceTotalAmount) + '</td>' +
                '<td>৳' + fmt(inv.discount) + '</td>' +
                '<td><strong style="color:#16a34a;">৳' + fmt(inv.paidAmount) + '</strong></td>' +
                '</tr>';
        });

        html += '<tr style="border-top:2px solid #e2e8f0;"><td colspan="5"><strong>মোট পরিশোধ</strong></td><td class="detail-total">৳' + fmt(totalPaidInGroup) + '</td></tr>';
        html += '</tbody></table>';
        html += '</div></td></tr>';

        $tr.after(html);
    }

    function printReceipt(groupIdx) {
        var g = _paymentGroups[groupIdx];
        if (!g) return;

        var ins = _institutionInfo;
        var shopName  = ins.institutionName || 'TailorBD';
        var shopPhone = ins.phone   || '';
        var shopAddr  = ins.address || '';
        var logoLetter = shopName.charAt(0).toUpperCase();

        var amt      = g.totalAmount || 0;
        var invCount = g.invoices ? g.invoices.length : 0;
        var receiptNo = 'RCP-' + (groupIdx + 1).toString().padStart(6, '0');

        // Build invoice rows
        var invRows  = '';
        var totalPaid = 0;
        if (g.invoices && g.invoices.length) {
            g.invoices.forEach(function(inv, i) {
                totalPaid += (inv.paidAmount || 0);
                invRows +=
                    '<tr>' +
                    '<td>' + (i + 1) + '</td>' +
                    '<td>' + (inv.invoice_For || '-') + '</td>' +
                    '<td>1</td>' +
                    '<td>৳' + fmt(inv.invoiceTotalAmount) + '</td>' +
                    '<td>৳' + fmt(inv.paidAmount) + '</td>' +
                    '</tr>';
            });
        }

        var html =
        '<div class="rcpt">' +

        // ── Green banner with logo ────────────────────────────────
        '<div class="rcpt-banner">' +
            '<div class="rcpt-banner-left" style="display:flex;align-items:center;padding-left:14px;">' +
                '<img src="/images/logo.png" alt="TailorBD" style="height:30px;width:auto;object-fit:contain;" />' +
            '</div>' +
            '<div class="rcpt-banner-title">RECEIPT</div>' +
            '<div class="rcpt-banner-right"></div>' +
        '</div>' +
        '<div class="rcpt-service-sub">টেইলরবিডি সফটওয়্যার সার্ভিস চার্জ &nbsp;|&nbsp; TailorBD Software Service Charge</div>' +

        // ── Two-column info ───────────────────────────────────────
        '<div class="rcpt-info">' +
            '<div class="rcpt-info-left">' +
                '<div class="rcpt-info-head">RECEIPT TO:</div>' +
                '<div class="rcpt-info-line"><i class="fas fa-store"></i><span>' + shopName + '</span></div>' +
                (shopAddr  ? '<div class="rcpt-info-line"><i class="fas fa-map-marker-alt"></i><span>' + shopAddr  + '</span></div>' : '') +
                (shopPhone ? '<div class="rcpt-info-line"><i class="fas fa-phone"></i><span>' + shopPhone + '</span></div>' : '') +
            '</div>' +
            '<div class="rcpt-info-right">' +
                '<div class="rcpt-receipt-no">RECEIPT #' + receiptNo + '</div>' +
                '<div class="rcpt-info-line"><i class="fas fa-calendar-check"></i> Paid Date: ' + fmtDate(g.paidDate) + '</div>' +
                '<div class="rcpt-info-line"><i class="fas fa-credit-card"></i> Payment Method: ' + (g.payment_Method || '-') + '</div>' +
                '<div class="rcpt-info-line"><i class="fas fa-user-check"></i> Collected By: ' + (g.collected_By || '-') + '</div>' +
            '</div>' +
        '</div>' +

        // ── Invoice table ─────────────────────────────────────────
        '<table class="rcpt-table">' +
            '<thead><tr>' +
                '<th>SN</th>' +
                '<th>Description</th>' +
                '<th>Unit</th>' +
                '<th>Unit Price</th>' +
                '<th>Line Total</th>' +
            '</tr></thead>' +
            '<tbody>' + invRows + '</tbody>' +
            '<tfoot><tr>' +
                '<td colspan="4">মোট পরিশোধিত</td>' +
                '<td>৳' + fmt(totalPaid) + '</td>' +
            '</tr></tfoot>' +
        '</table>' +

        // ── Bottom section ────────────────────────────────────────
        '<div class="rcpt-bottom">' +
            '<div class="rcpt-bottom-left">' +
                '<div class="rcpt-thankyou"><i class="fas fa-check-circle"></i> Thank you for using TailorBD.</div>' +
                '<div class="rcpt-method-label">Payment Method:</div>' +
                '<div class="rcpt-method-item"><i class="fas fa-credit-card"></i> ' + (g.payment_Method || '-') + '</div>' +
                '<div class="rcpt-method-item" style="margin-top:10px; color:#94a3b8; font-size:.68rem;">' +
                    '<i class="fas fa-info-circle"></i> এই রিসিটটি কম্পিউটার দ্বারা তৈরি।' +
                '</div>' +
            '</div>' +
            '<div class="rcpt-bottom-right">' +
                '<table class="rcpt-summary">' +
                    '<tr><td>Total:</td><td>৳' + fmt(totalPaid) + '</td></tr>' +
                    '<tr><td>Paid:</td><td>৳' + fmt(amt) + '</td></tr>' +
                    '<tr class="rcpt-sum-total"><td>Total Paid (' + invCount + ' inv):</td><td>৳' + fmt(amt) + '</td></tr>' +
                '</table>' +
            '</div>' +
        '</div>' +

        // ── Signature ─────────────────────────────────────────────
        '<div class="rcpt-sig">' +
            '<div class="rcpt-sig-line"></div>' +
            '<div class="rcpt-sig-label">Authorised Sign</div>' +
        '</div>' +
