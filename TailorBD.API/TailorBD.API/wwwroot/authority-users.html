<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - TailorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/lib/fontawesome/css/all.min.css">
    <link href="/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/authority-profile.css">
    <script src="/js/auth.js?v=2.1.6"></script>
    <!-- Shared sidebar + navbar component -->
    <script src="/js/authority-layout.js?v=2.1.6" data-page="users"></script>
    <style>
        :root {
            --indigo-grad: linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
            --green-grad:  linear-gradient(135deg,#10b981 0%,#059669 100%);
            --red-grad:    linear-gradient(135deg,#ef4444 0%,#dc2626 100%);
            --orange-grad: linear-gradient(135deg,#f97316 0%,#ea580c 100%);
            --blue-grad:   linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);
        }

        /* Page header */
        .page-header {
            background: var(--indigo-grad);
            border-radius: 14px; padding: 22px 28px; color:#fff;
            display:flex; align-items:center; gap:18px;
            box-shadow: 0 8px 32px rgba(99,102,241,.3);
            margin-bottom:22px; position:relative; overflow:hidden;
        }
        .page-header::before {
            content:''; position:absolute; width:200px; height:200px;
            border-radius:50%; background:rgba(255,255,255,.07);
            top:-70px; right:-40px;
        }
        .ph-icon { width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;z-index:1; }
        .ph-text { z-index:1;flex:1; }
        .ph-text h2 { font-size:1.25rem;font-weight:700;margin:0 0 3px; }
        .ph-text p  { font-size:.84rem;opacity:.85;margin:0; }

        /* Stats */
        .stat-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:22px; }
        .stat-card  { background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 4px 20px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px; }
        .sc-icon { width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0; }
        .sc-val { font-size:1.4rem;font-weight:800;color:#1e293b;line-height:1; }
        .sc-lbl { font-size:.72rem;color:#94a3b8;font-weight:600;margin-top:2px; }

        /* Institution card */
        .ins-block {
            background:#fff; border-radius:14px;
            box-shadow:0 4px 20px rgba(0,0,0,.07);
            border:1.5px solid #e2e8f0;
            margin-bottom:16px; overflow:hidden;
        }
        .ins-block-header {
            padding:13px 18px;
            background:#f8fafc;
            border-bottom:1px solid #e2e8f0;
            display:flex; align-items:center; gap:12px; cursor:pointer;
            user-select:none;
        }
        .ins-block-header:hover { background:#f1f5f9; }
        .ins-badge-valid   { background:#d1fae5;color:#065f46;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700; }
        .ins-badge-invalid { background:#fee2e2;color:#991b1b;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700; }
        .ins-block-body { padding:14px 18px; }

        /* User row */
        .user-row {
            display:flex; align-items:center; flex-wrap:wrap; gap:10px;
            padding:11px 14px; border-radius:10px; border:1px solid #f1f5f9;
            margin-bottom:8px; background:#fafbff; transition:border-color .18s;
        }
        .user-row:hover { border-color:#c7d2fe; }
        .user-row:last-child { margin-bottom:0; }

        .user-avatar {
            width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
            justify-content:center;font-size:.95rem;font-weight:700;color:#fff;flex-shrink:0;
        }
        .avatar-admin    { background:var(--indigo-grad); }
        .avatar-subadmin { background:var(--blue-grad); }

        .user-info { flex:1;min-width:180px; }
        .user-name  { font-size:.88rem;font-weight:700;color:#1e293b; }
        .user-cat   { font-size:.72rem;color:#94a3b8;font-weight:600; }

        .user-cred {
            font-family:monospace; font-size:.78rem;
            background:#f1f5f9; border-radius:7px; padding:4px 10px;
            color:#475569; min-width:120px;
        }
        .user-cred .cred-lbl { font-size:.65rem;color:#94a3b8;font-weight:600;text-transform:uppercase; }

        .badge-locked   { background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:20px;font-size:.69rem;font-weight:700; }
        .badge-approved { background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:20px;font-size:.69rem;font-weight:700; }
        .badge-unapproved{ background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:20px;font-size:.69rem;font-weight:700; }

        .user-actions { display:flex;gap:6px;flex-wrap:wrap;margin-left:auto; }
        .btn-act {
            display:inline-flex;align-items:center;gap:4px;
            padding:4px 11px;border-radius:8px;border:none;
            font-size:.75rem;font-weight:600;cursor:pointer;transition:all .16s;white-space:nowrap;
        }
        .btn-unlock  { background:#fef3c7;color:#92400e;border:1px solid #fde68a; }
        .btn-unlock:hover  { background:#f59e0b;color:#fff; }
        .btn-approve { background:#d1fae5;color:#065f46;border:1px solid #a7f3d0; }
        .btn-approve:hover { background:#10b981;color:#fff; }
        .btn-unapprove { background:#fee2e2;color:#991b1b;border:1px solid #fecaca; }
        .btn-unapprove:hover { background:#ef4444;color:#fff; }
        .btn-pwd     { background:#ede9fe;color:#6366f1;border:1px solid #c4b5fd; }
        .btn-pwd:hover { background:#6366f1;color:#fff; }
        .btn-eye     { background:#f0f9ff;color:#0284c7;border:1px solid #bae6fd; }
        .btn-eye:hover { background:#0ea5e9;color:#fff; }

        /* Password visible */
        .pwd-visible { color:#1e293b;font-weight:700; }
        .pwd-hidden  { letter-spacing:3px;color:#94a3b8; }

        /* Filter bar */
        .filter-bar { background:#fff;border-radius:14px;padding:14px 18px;box-shadow:0 4px 20px rgba(0,0,0,.07);margin-bottom:18px;display:flex;flex-wrap:wrap;gap:12px;align-items:center; }

        /* Toast */
        #toastWrap { position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
        .toast-item { padding:12px 18px;border-radius:10px;font-size:.85rem;color:#fff;min-width:240px;box-shadow:0 4px 14px rgba(0,0,0,.15);animation:slideIn .3s ease; }
        .toast-item.success { background:#10b981; }
        .toast-item.error   { background:#ef4444; }
        .toast-item.info    { background:#3b82f6; }
        @keyframes slideIn { from{transform:translateX(60px);opacity:0} to{transform:translateX(0);opacity:1} }

        .section-card { background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.07);padding:18px 20px;margin-bottom:16px; }

        .collapse-icon { transition:transform .25s; }
        .collapsed .collapse-icon { transform:rotate(-90deg); }

        @media(max-width:600px) {
            .user-row { flex-direction:column;align-items:flex-start; }
            .user-actions { margin-left:0; }
        }
    </style>
</head>
<body>

<!-- -- MAIN -- -->
<div class="auth-main">
    <div class="auth-content">

        <!-- Page Header -->
        <div class="page-header">
            <div class="ph-icon"><i class="fas fa-users-cog"></i></div>
            <div class="ph-text">
                <h2>ব্যবহারকারী ব্যবস্থাপনা</h2>
                <p>প্রতিষ্ঠানভিত্তিক যাবতীয় ইউজার দেখুন, অনুমোদন ও পাসওয়ার্ড পরিবর্তন করুন</p>
            </div>
            <div style="z-index:1;margin-left:auto;">
                <button class="btn-sm-act" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.35);padding:7px 16px;border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;" onclick="loadUsers()">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> রিফ্রেশ
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="sc-icon" style="background:var(--indigo-grad);"><i class="fas fa-building"></i></div>
                <div><div class="sc-val" id="statIns">�</div><div class="sc-lbl">প্রতিষ্ঠান</div></div>
            </div>
            <div class="stat-card">
                <div class="sc-icon" style="background:var(--blue-grad);"><i class="fas fa-users"></i></div>
                <div><div class="sc-val" id="statUsers">�</div><div class="sc-lbl">মোট ইউজার</div></div>
            </div>
            <div class="stat-card">
                <div class="sc-icon" style="background:var(--red-grad);"><i class="fas fa-lock"></i></div>
                <div><div class="sc-val" id="statLocked">�</div><div class="sc-lbl">লক ইউজার</div></div>
            </div>
            <div class="stat-card">
                <div class="sc-icon" style="background:var(--orange-grad);"><i class="fas fa-user-times"></i></div>
                <div><div class="sc-val" id="statUnapproved">�</div><div class="sc-lbl">অনুমোদনহীন</div></div>
            </div>
            <div class="stat-card">
                <div class="sc-icon" style="background:var(--green-grad);"><i class="fas fa-user-check"></i></div>
                <div><div class="sc-val" id="statApproved">�</div><div class="sc-lbl">অনুমোদিত</div></div>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <div class="input-group" style="max-width:280px;">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fas fa-search text-muted" style="font-size:.82rem;"></i>
                </span>
                <input type="text" id="searchInput" class="form-control border-start-0 ps-0"
                       placeholder="প্রতিষ্ঠান / ইউজার নাম / মোবাইল..." oninput="applyFilters()">
            </div>

            <div class="btn-group" role="group">
                <button type="button" class="btn btn-sm btn-outline-secondary f-btn active" onclick="setFilter('',this)">সবাই</button>
                <button type="button" class="btn btn-sm btn-outline-danger f-btn"   onclick="setFilter('locked',this)">
                    <i class="fas fa-lock me-1"></i>লক
                </button>
                <button type="button" class="btn btn-sm btn-outline-warning f-btn" onclick="setFilter('unapproved',this)">
                    <i class="fas fa-user-times me-1"></i>অনুমোদনহীন
                </button>
            </div>

            <div id="resultInfo" style="font-size:.82rem;color:#64748b;margin-left:auto;"></div>
        </div>

        <!-- User list -->
        <div id="userListWrap">
            <div class="section-card text-center py-5">
                <div class="spinner-border text-primary me-2"></div> লোড হচ্ছে...
            </div>
        </div>

    </div><!-- /auth-content -->
</div><!-- /auth-main -->

<!-- -- PASSWORD RESET MODAL -- -->
<div class="modal fade" id="pwdModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">
                    <i class="fas fa-key me-2 text-indigo" style="color:#6366f1;"></i>পাসওয়ার্ড রিসেট
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="pwdUserName">
                <div class="mb-2">
                    <div style="font-size:.78rem;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px;">ইউজার</div>
                    <div id="pwdUserDisplay" style="font-size:.9rem;font-weight:700;color:#1e293b;"></div>
                </div>
                <div class="mb-1">
                    <label style="font-size:.82rem;font-weight:600;color:#475569;">
                        নতুন পাসওয়ার্ড <span class="text-danger">*</span>
                    </label>
                    <div class="input-group mt-1">
                            <input type="password" id="newPwdInput" class="form-control"
                                   placeholder="নতুন পাসওয়ার্ড দিন" autocomplete="new-password">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePwdVis()">
                            <i class="fas fa-eye" id="pwdEyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div style="font-size:.75rem;color:#94a3b8;margin-top:4px;">
                    নতুন পাসওয়ার্ড দিতে কমপক্ষে ৬ অক্ষর হতে হবে
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-light border rounded-pill px-3" data-bs-dismiss="modal">বাতিল</button>
                <button class="btn btn-primary rounded-pill px-4 fw-bold" onclick="submitResetPwd()">
                    <i class="fas fa-check me-1"></i>রিসেট করুন
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toastWrap"></div>

<script src="/lib/jquery/jquery.min.js"></script>
<script src="/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/js/authority-users.js?v=2.1.6"></script>
</body>
</html>
