<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Sales Report - TailorBD" data-bn="বিক্রয় রিপোর্ট - TailorBD">বিক্রয় রিপোর্ট - TailorBD</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        #app-navbar { margin-left:260px; transition:margin-left .3s ease; }
        .page-container { width:100%; padding:16px 24px; }
        @media(max-width:992px){ #app-navbar{margin-left:0;} .main-content{margin-left:0;} .page-container{padding:10px;} }

        /* Filter */
        .filter-card { background:#fff; border-radius:10px; padding:16px 20px; box-shadow:0 2px 10px rgba(0,0,0,.07); margin-bottom:18px; }
        .f-label  { font-size:12px; font-weight:600; color:#555; margin-bottom:3px; display:block; }
        .f-control{ width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:6px; font-size:13px; font-family:inherit; box-sizing:border-box; }
        .f-control:focus { outline:none; border-color:#6c7ae0; box-shadow:0 0 0 3px rgba(108,122,224,.1); }
        .btn-load { padding:8px 22px; background:#6c7ae0; color:#fff; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .btn-load:hover { background:#5a68c9; }
        .btn-outline{ padding:8px 16px; background:#fff; color:#6c7ae0; border:1.5px solid #6c7ae0; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
        .btn-outline:hover { background:#f0f1fc; }

        /* KPI Cards */
        .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
        .kpi-card { background:#fff; border-radius:10px; padding:14px 16px; box-shadow:0 2px 10px rgba(0,0,0,.07); border-left:4px solid #6c7ae0; }
        .kpi-card.green  { border-color:#28a745; }
        .kpi-card.red    { border-color:#dc3545; }
        .kpi-card.orange { border-color:#fd7e14; }
        .kpi-card.teal   { border-color:#20c997; }
        .kpi-card.purple { border-color:#9b59b6; }
        .kpi-val  { font-size:20px; font-weight:800; color:#333; white-space:nowrap; }
        .kpi-val.blue   { color:#6c7ae0; }
        .kpi-val.green  { color:#28a745; }
        .kpi-val.red    { color:#dc3545; }
        .kpi-val.orange { color:#fd7e14; }
        .kpi-val.teal   { color:#20c997; }
        .kpi-val.purple { color:#9b59b6; }
        .kpi-lbl  { font-size:11.5px; color:#888; margin-top:3px; }
        .kpi-icon { font-size:22px; float:right; opacity:.2; margin-top:-4px; }

        /* Section cards */
        .sec-card { background:#fff; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.07); margin-bottom:20px; overflow:hidden; }
        .sec-head { padding:13px 18px; display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:#fff; }
        .sec-head.blue   { background:#6c7ae0; }
        .sec-head.green  { background:#28a745; }
        .sec-head.orange { background:#fd7e14; }
        .sec-head.red    { background:#dc3545; }
        .sec-head.teal   { background:#20c997; }
        .sec-head.purple { background:#9b59b6; }
        .sec-body { padding:16px 18px; }

        /* Tables */
        .rep-tbl { width:100%; border-collapse:collapse; }
        .rep-tbl thead th { background:#f8f9ff; padding:9px 11px; font-size:12px; font-weight:700; color:#555; border-bottom:2px solid #e0e3f7; text-align:center; white-space:nowrap; }
        .rep-tbl tbody tr:hover { background:#fafbff; }
        .rep-tbl tbody td { padding:8px 11px; font-size:13px; border-bottom:1px solid #f2f2f2; text-align:center; vertical-align:middle; }
        .rank-badge { display:inline-block; width:24px; height:24px; border-radius:50%; background:#6c7ae0; color:#fff; font-size:11px; font-weight:700; line-height:24px; text-align:center; }
        .rank-badge.g1 { background:#ffd700; color:#333; }
        .rank-badge.g2 { background:#c0c0c0; color:#333; }
        .rank-badge.g3 { background:#cd7f32; color:#fff; }

        /* Bar chart */
        .trend-chart { padding:8px 4px 0; }
        .trend-grid  { display:grid; grid-template-columns:repeat(12,1fr); gap:4px; align-items:end; height:190px; }
        .trend-col   { display:flex; flex-direction:column; align-items:center; height:100%; cursor:default; }
        .trend-col:hover .trend-bar { filter:brightness(1.15); }
        .trend-amt   { font-size:9px; color:#28a745; font-weight:700; min-height:14px; text-align:center; white-space:nowrap; }
        .trend-bar-wrap { flex:1; width:100%; display:flex; align-items:flex-end; padding:0 2px; }
        .trend-bar   { width:100%; border-radius:4px 4px 0 0; transition:height .4s ease; min-height:2px; }
        .trend-mon   { font-size:9px; color:#777; text-align:center; margin-top:4px; line-height:1.3; }
        .trend-orders{ font-size:9px; color:#aaa; min-height:13px; text-align:center; }

        /* Progress bar */
        .prog-wrap { background:#f0f0f0; border-radius:99px; height:7px; overflow:hidden; }
        .prog-bar  { height:100%; border-radius:99px; background:#6c7ae0; transition:width .5s; }

        /* Spinner */
        .spin-wrap { text-align:center; padding:40px; color:#aaa; }
        .spin { width:28px; height:28px; border:3px solid #e0e3f7; border-top-color:#6c7ae0; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Print */
        @media print {
            #app-navbar, #app-sidebar, .filter-card, .no-print { display:none !important; }
            .main-content { margin-left:0 !important; }
            .page-container { padding:0 !important; }
            .kpi-card, .sec-card { break-inside:avoid; box-shadow:none; border:1px solid #ddd; }
        }
    </style>
</head>
<body>
    <div id="app-navbar"></div>
    <div id="app-sidebar"></div>
    <div id="app-modals"></div>

    <main class="main-content" id="mainContent">
        <div class="dashboard-content">
            <div class="page-container">

                <!-- Title -->
                <div class="d-flex justify-content-between align-items-center mb-3 no-print">
                    <h5 style="font-weight:700; color:#6c7ae0; margin:0;">
                        <i class="fas fa-chart-line me-2"></i>
                        <span data-en="Sales Report" data-bn="বিক্রয় রিপোর্ট">বিক্রয় রিপোর্ট</span>
                    </h5>
                    <button class="btn-outline" onclick="window.print()">
                        <i class="fas fa-print"></i>
                        <span data-en="Print" data-bn="প্রিন্ট">প্রিন্ট</span>
                    </button>
                </div>

                <!-- Filter -->
                <div class="filter-card no-print">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-3 col-6">
                            <label class="f-label"><span data-en="Date From" data-bn="তারিখ থেকে">তারিখ থেকে</span></label>
                            <input type="date" id="fFrom" class="f-control">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="f-label"><span data-en="Date To" data-bn="তারিখ পর্যন্ত">তারিখ পর্যন্ত</span></label>
                            <input type="date" id="fTo" class="f-control">
                        </div>
                        <div class="col-md-6 col-12 d-flex gap-2 flex-wrap">
                            <button class="btn-load" onclick="loadReport()">
                                <i class="fas fa-sync-alt"></i>
                                <span data-en="Load Report" data-bn="রিপোর্ট লোড করুন">রিপোর্ট লোড করুন</span>
                            </button>
                            <button class="btn-outline" onclick="setThisMonth()">
                                <i class="fas fa-calendar-alt"></i>
                                <span data-en="This Month" data-bn="এই মাস">এই মাস</span>
                            </button>
                            <button class="btn-outline" onclick="clearDates()">
                                <i class="fas fa-undo"></i>
                                <span data-en="All Time" data-bn="সার্বকালীন">সার্বকালীন</span>
                            </button>
                        </div>
                    </div>
                    <div id="dateRangeLabel" style="font-size:12px; color:#888; margin-top:8px;"></div>
                </div>

                <!-- Loading -->
                <div id="spinWrap" class="spin-wrap"><div class="spin"></div></div>

                <!-- Content -->
                <div id="reportContent" style="display:none;">

                    <!-- KPI Cards -->
                    <div class="kpi-grid" id="kpiGrid"></div>

                    <!-- 2-col layout -->
                    <div class="row g-3">

                        <!-- Monthly Trend -->
                        <div class="col-lg-7">
                            <div class="sec-card">
                                <div class="sec-head blue">
                                    <i class="fas fa-chart-bar"></i>
                                    <span data-en="Monthly Sales Trend (Last 12 Months)" data-bn="মাসিক বিক্রয় প্রবণতা (শেষ ১২ মাস)">মাসিক বিক্রয় প্রবণতা (শেষ ১২ মাস)</span>
                                </div>
                                <div class="sec-body">
                                    <div id="barChartWrap"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Return Summary -->
                        <div class="col-lg-5">
                            <div class="sec-card">
                                <div class="sec-head red">
                                    <i class="fas fa-undo-alt"></i>
                                    <span data-en="Return Summary" data-bn="ফেরতের সারসংক্ষেপ">ফেরতের সারসংক্ষেপ</span>
                                </div>
                                <div class="sec-body" id="returnSummaryBox"></div>
                            </div>
                        </div>

                        <!-- Top Sold Items -->
                        <div class="col-lg-7">
                            <div class="sec-card">
                                <div class="sec-head orange">
                                    <i class="fas fa-fire"></i>
                                    <span data-en="Top 10 Best Selling Items" data-bn="শীর্ষ ১০ সর্বাধিক বিক্রিত আইটেম">শীর্ষ ১০ সর্বাধিক বিক্রিত আইটেম</span>
                                </div>
                                <div class="sec-body p-0">
                                    <div style="overflow-x:auto;">
                                        <table class="rep-tbl">
                                            <thead>
                                                <tr>
                                                    <th>#</th>
                                                    <th><span data-en="Code" data-bn="কোড">কোড</span></th>
                                                    <th><span data-en="Item Name" data-bn="আইটেমের নাম">আইটেমের নাম</span></th>
                                                    <th><span data-en="Total Qty" data-bn="মোট পরিমাণ">মোট পরিমাণ</span></th>
                                                    <th><span data-en="Avg Price" data-bn="গড় মূল্য">গড় মূল্য</span></th>
                                                    <th><span data-en="Total Value" data-bn="মোট মূল্য">মোট মূল্য</span></th>
                                                    <th><span data-en="Stock" data-bn="স্টক">স্টক</span></th>
                                                </tr>
                                            </thead>
                                            <tbody id="topItemsBody"></tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Top Customers -->
                        <div class="col-lg-5">
                            <div class="sec-card">
                                <div class="sec-head purple">
                                    <i class="fas fa-users"></i>
                                    <span data-en="Top Customers" data-bn="শীর্ষ কাস্টমার">শীর্ষ কাস্টমার</span>
                                </div>
                                <div class="sec-body p-0">
                                    <div style="overflow-x:auto;">
                                        <table class="rep-tbl">
                                            <thead>
                                                <tr>
                                                    <th>#</th>
                                                    <th><span data-en="Customer" data-bn="কাস্টমার">কাস্টমার</span></th>
                                                    <th><span data-en="Orders" data-bn="অর্ডার">অর্ডার</span></th>
                                                    <th><span data-en="Amount" data-bn="পরিমাণ">পরিমাণ</span></th>
                                                    <th><span data-en="Due" data-bn="বাকি">বাকি</span></th>
                                                </tr>
                                            </thead>
                                            <tbody id="topCustomersBody"></tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Return Items -->
                        <div class="col-12">
                            <div class="sec-card" id="returnItemsSec" style="display:none;">
                                <div class="sec-head red">
                                    <i class="fas fa-undo"></i>
                                    <span data-en="Most Returned Items" data-bn="সর্বাধিক ফেরত আইটেম">সর্বাধিক ফেরত আইটেম</span>
                                </div>
                                <div class="sec-body" id="returnItemsBody"></div>
                            </div>
                        </div>

                    </div><!-- row -->
                </div><!-- reportContent -->

            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js?v=2.1.7"></script>
    <script src="/js/item-sell-report.js?v=2.1.6"></script>
</body>
</html>
