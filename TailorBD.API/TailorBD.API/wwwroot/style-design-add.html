<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্টাইল ডিজাইন - TailorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <style>
        /* -- Compact page overrides -- */
        .page-header { margin-bottom: 16px !important; }
        .page-header h1 { font-size: 1.3rem; margin-bottom: 2px; }
        .page-header p   { font-size: .85rem; margin: 0; }

        /* Add-form card */
        .add-form-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e3e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            margin-bottom: 16px;
        }
        .add-form-card .card-header {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px 10px 0 0;
            font-size: .9rem;
            font-weight: 600;
        }
        .add-form-card .card-body { padding: 12px 16px; }

        /* Table card */
        .table-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e3e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            padding: 0;
            overflow: hidden;
        }
        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #e3e8f0;
            background: #f8f9ff;
        }
        .table-card-header h6 { margin: 0; font-weight: 600; color: #444; font-size: .95rem; }

        /* Compact table */
        #designsTable { margin: 0; font-size: .875rem; }
        #designsTable thead tr {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }
        #designsTable thead th {
            color: #fff; font-weight: 600;
            padding: 8px 12px;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .4px;
            white-space: nowrap;
            border: none;
        }
        #designsTable tbody td {
            padding: 5px 12px;
            vertical-align: middle;
            border-color: #f0f0f0;
        }
        #designsTable tbody tr:hover { background: #f8f9ff; }

        /* Thumbnail � compact */
        .design-thumb {
            width: 42px;
            height: 42px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .design-thumb-placeholder {
            width: 42px;
            height: 42px;
            border-radius: 5px;
            border: 1px dashed #ccc;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 1rem;
        }

        /* Serial input */
        .serial-input {
            width: 68px !important;
            text-align: center;
            padding: 3px 6px;
            font-size: .85rem;
        }

        /* Compact buttons */
        .btn-action {
            padding: 3px 8px;
            font-size: .78rem;
            border-radius: 5px;
            line-height: 1.4;
        }

        /* Update serial btn */
        #updateSerialsBtn { padding: 5px 14px; font-size: .82rem; }
    </style>
</head>
<body>
    <div id="app-sidebar"></div>
    <main class="main-content" id="mainContent">
        <div id="app-navbar"></div>
        <div class="dashboard-content">
            <div id="alertContainer"></div>

            <!-- Page Header -->
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h1>'<span id="categoryName"></span>' এর স্টাইল ডিজাইন</h1>
                    <p class="text-muted" id="dressNameHeader"></p>
                </div>
                <a href="#" id="backButton" class="btn btn-sm btn-secondary">
                    <i class="fas fa-arrow-left me-1"></i> ফিরে যান
                </a>
            </div>

            <!-- Add Design Form -->
            <div class="add-form-card">
                <div class="card-header">
                    <i class="fas fa-plus-circle me-1"></i> নতুন ডিজাইন যোগ করুন
                </div>
                <div class="card-body">
                    <form id="addDesignForm">
                        <div class="row g-2 align-items-end">
                            <div class="col-sm-4">
                                <label class="form-label form-label-sm mb-1">ডিজাইনের নাম</label>
                                <input type="text" class="form-control form-control-sm" id="designName"
                                       placeholder="যেমন: চাইনিজ, হাওয়াই..." required>
                            </div>
                            <div class="col-sm-2">
                                <label class="form-label form-label-sm mb-1">ক্রমিক নম্বর</label>
                                <input type="number" class="form-control form-control-sm" id="designSerial"
                                       placeholder="১, ২..." min="1">
                            </div>
                            <div class="col-sm-3">
                                <label class="form-label form-label-sm mb-1">ছবি (ঐচ্ছিক)</label>
                                <input type="file" class="form-control form-control-sm" id="designImage" accept="image/*">
                            </div>
                            <div class="col-sm-3">
                                <button type="submit" class="btn btn-primary btn-sm w-100">
                                    <i class="fas fa-plus me-1"></i> ডিজাইন যোগ করুন
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Designs Table -->
            <div class="table-card">
                <div class="table-card-header">
                    <h6><i class="fas fa-palette me-2 text-primary"></i>ডিজাইন তালিকা</h6>
                    <button type="button" class="btn btn-success btn-sm" id="updateSerialsBtn" style="display:none;">
                        <i class="fas fa-save me-1"></i> ক্রমিক আপডেট করুন
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover" id="designsTable">
                        <thead>
                            <tr>
                                <th style="width:60px;">নির্বাচন</th>
                                <th>ডিজাইনের নাম</th>
                                <th style="width:70px;">ছবি</th>
                                <th style="width:90px;">ক্রমিক</th>
                                <th style="width:60px;">মুছুন</th>
                            </tr>
                        </thead>
                        <tbody id="designsTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <span class="spinner-border spinner-border-sm me-2"></span> লোড হচ্ছে...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="app-modals"></div>

    <!-- Edit Design Modal -->
    <div class="modal fade" id="editDesignModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header py-2" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;">
                    <h6 class="modal-title mb-0"><i class="fas fa-edit me-1"></i> ডিজাইন সম্পাদনা</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editDesignId">
                    <div class="mb-3">
                        <label class="form-label">ডিজাইনের নাম</label>
                        <input type="text" class="form-control" id="editDesignName" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">ছবি পরিবর্তন করুন</label>
                        <input type="file" class="form-control form-control-sm" id="editDesignImage" accept="image/*">
                        <small class="text-muted">খালি রাখলে আগের ছবি থাকবে</small>
                    </div>
                    <div class="text-center">
                        <img id="editDesignImagePreview" src="" alt="Current"
                             style="max-width:100%; max-height:80px; border-radius:5px; display:none;" class="mt-2">
                    </div>
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">বাতিল</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="updateDesign()">
                        <i class="fas fa-save me-1"></i> সংরক্ষণ করুন
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/app-components.js?v=2.1.4"></script>
    <script src="/js/style-design-add.js?v=2.1.4"></script>
</body>
</html>
