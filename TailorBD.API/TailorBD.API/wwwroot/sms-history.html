<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="SMS History - TailorBD" data-bn="SMS ইতিহাস - TailorBD">SMS ইতিহাস - TailorBD</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        #app-navbar { margin-left:260px; transition:margin-left .3s ease; }
        .page-container { padding:16px 24px; }
        @media(max-width:992px){ #app-navbar{margin-left:0;} .main-content{margin-left:0;} .page-container{padding:10px;} }

        /* Card */
        .card-box  { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); overflow:hidden; margin-bottom:16px; }
        .card-head { padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0f0f0; background:#fafbff; }
        .card-title{ font-weight:700; font-size:14px; color:#6c7ae0; }

        /* Search bar */
        .search-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; padding:12px 20px; border-bottom:1px solid #f0f0f0; background:#fff; }
        .f-group { display:flex; flex-direction:column; }
        .f-label { font-size:11px; font-weight:700; color:#666; margin-bottom:3px; }
        .f-ctrl  { padding:6px 11px; border:1.5px solid #ddd; border-radius:7px; font-size:13px; font-family:inherit; }
        .f-ctrl:focus { outline:none; border-color:#6c7ae0; box-shadow:0 0 0 2px rgba(108,122,224,.12); }

        /* Result strip */
        .result-strip { display:flex; gap:10px; align-items:center; padding:7px 20px; background:#fffbf0; border-bottom:1px solid #f0f0f0; font-size:12px; }

        /* Buttons */
        .btn-pri  { padding:7px 16px; background:#6c7ae0; color:#fff; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
        .btn-pri:hover  { background:#5a68c9; }
        .btn-gray { padding:6px 14px; background:#f5f5f5; color:#555; border:1.5px solid #ddd; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
        .btn-gray:hover { background:#eee; }
        .btn-send-link { padding:7px 16px; background:#6c7ae0; color:#fff; border-radius:7px; font-size:13px; font-weight:600; text-decoration:none; }
        .btn-send-link:hover { background:#5a68c9; color:#fff; }

        /* Table */
        .h-table { width:100%; border-collapse:collapse; font-size:12px; }
        .h-table thead th { background:#f4f5ff; padding:9px 14px; font-size:11px; font-weight:700; color:#555; border-bottom:2px solid #e0e3f7; white-space:nowrap; }
        .h-table tbody td { padding:8px 14px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
        .h-table tbody tr:hover { background:#fafbff; }
        .badge-sent { background:#e8f5e9; color:#28a745; border-radius:5px; padding:2px 8px; font-size:10px; font-weight:700; }
        .msg-cell { max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* Pager */
        .pager-wrap { display:flex; gap:4px; flex-wrap:wrap; align-items:center; padding:10px 20px; background:#fafbff; border-top:1px solid #f0f0f0; }
        .pager-wrap button { padding:4px 10px; border:1.5px solid #ddd; border-radius:5px; background:#fff; font-size:11px; cursor:pointer; font-family:inherit; font-weight:600; }
        .pager-wrap button.active { background:#6c7ae0; color:#fff; border-color:#6c7ae0; }
        .pager-wrap button:disabled { opacity:.35; cursor:not-allowed; }
        .pager-info { font-size:11px; color:#888; margin-left:auto; }

        /* Spinner */
        .spin-wrap { text-align:center; padding:28px; color:#aaa; }
        .spin { width:26px; height:26px; border:3px solid #e0e3f7; border-top-color:#6c7ae0; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .no-data { text-align:center; padding:28px; color:#bbb; font-size:13px; }

        /* Highlight search match */
        .hl { background:#fff3cd; border-radius:3px; padding:0 2px; }
    </style>
</head>
<body>
<div id="app-navbar"></div>
<div id="app-sidebar"></div>
<div id="app-modals"></div>

<main class="main-content" id="mainContent">
<div class="dashboard-content">
<div class="page-container">

    <!-- Page title -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 style="font-weight:800;color:#6c7ae0;margin:0;">
            <i class="fas fa-history me-2"></i>
            <span data-en="SMS History" data-bn="SMS ইতিহাস">SMS ইতিহাস</span>
        </h5>
        <a href="/sms.html" class="btn-send-link">
            <i class="fas fa-paper-plane me-1"></i>
            <span data-en="Send SMS" data-bn="SMS পাঠান">SMS পাঠান</span>
        </a>
    </div>

    <div class="card-box">

        <!-- Search bar -->
        <div class="search-bar">
            <div class="f-group">
                <label class="f-label" data-en="From Date" data-bn="শুরুর তারিখ">শুরুর তারিখ</label>
                <input type="date" id="sFromDate" class="f-ctrl" style="width:145px;">
            </div>
            <div class="f-group">
                <label class="f-label" data-en="To Date" data-bn="শেষের তারিখ">শেষের তারিখ</label>
                <input type="date" id="sToDate" class="f-ctrl" style="width:145px;">
            </div>
            <div class="f-group">
                <label class="f-label" data-en="Customer Name" data-bn="কাস্টমারের নাম">কাস্টমারের নাম</label>
                <input type="text" id="sCustName" class="f-ctrl" style="width:160px;"
                    placeholder="নাম দিন"
                    data-en-placeholder="Customer name"
                    data-bn-placeholder="নাম দিন">
            </div>
            <div class="f-group">
                <label class="f-label" data-en="Mobile No" data-bn="মোবাইল নম্বর">মোবাইল নম্বর</label>
                <input type="text" id="sMobile" class="f-ctrl" style="width:150px;"
                    placeholder="01XXXXXXXXX"
                    data-en-placeholder="01XXXXXXXXX"
                    data-bn-placeholder="মোবাইল নম্বর">
            </div>
            <div class="f-group">
                <label class="f-label">&nbsp;</label>
                <div class="d-flex gap-2">
                    <button class="btn-pri" onclick="doSearch()">
                        <i class="fas fa-search me-1"></i>
                        <span data-en="Search" data-bn="অনুসন্ধান">অনুসন্ধান</span>
                    </button>
                    <button class="btn-gray" onclick="resetSearch()">
                        <span data-en="Reset" data-bn="রিসেট">রিসেট</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result strip -->
        <div class="result-strip">
            <span style="color:#888;" data-en="Total:" data-bn="মোট:">মোট:</span>
            <span id="histTotal" style="font-weight:700;color:#333;">0</span>
            <span style="color:#888;" data-en="records" data-bn="রেকর্ড">রেকর্ড</span>
        </div>

        <!-- Spinner / Table -->
        <div id="histSpinner" class="spin-wrap"><div class="spin"></div></div>
        <div id="histContent" style="display:none; overflow-x:auto;">
            <table class="h-table">
                <thead><tr>
                    <th data-en="Date" data-bn="তারিখ">তারিখ</th>
                    <th data-en="Customer" data-bn="কাস্টমার">কাস্টমার</th>
                    <th data-en="Mobile" data-bn="মোবাইল">মোবাইল</th>
                    <th data-en="Message" data-bn="বার্তা">বার্তা</th>
                    <th data-en="SMS" data-bn="SMS" style="text-align:center;">SMS</th>
                    <th data-en="Status" data-bn="স্টাটাস">স্টাটাস</th>
                </tr></thead>
                <tbody id="histBody"></tbody>
            </table>
        </div>

        <!-- Pager -->
        <div id="histPager" class="pager-wrap"></div>
    </div>

</div>
</div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app-components.js?v=2.1.7"></script>
<script>
(function () {
    'use strict';

    let institutionId = 0;
    const PAGE = 50;
    let curPage = 1;
    let debTimer = null;

    // -- Init ------------------------------------------------------------------
    $(document).ready(function () {
        institutionId = parseInt(sessionStorage.getItem('institutionId') || '0');
        if (!institutionId) {
            $(document).on('app-session-ready', function () {
                institutionId = parseInt(sessionStorage.getItem('institutionId') || '0');
                if (institutionId) loadHistory(1);
            });
            return;
        }
        // set today as default toDate
        const today = new Date().toISOString().slice(0, 10);
        $('#sToDate').val(today);
        loadHistory(1);
    });

    // -- Search ----------------------------------------------------------------
    window.doSearch = function () { loadHistory(1); };

    window.resetSearch = function () {
        $('#sFromDate,#sCustName,#sMobile').val('');
        $('#sToDate').val(new Date().toISOString().slice(0, 10));
        loadHistory(1);
    };

    // Auto-search on mobile / customer name input (debounce 500ms)
    $(document).on('input', '#sMobile,#sCustName', function () {
        clearTimeout(debTimer);
        debTimer = setTimeout(function () { loadHistory(1); }, 500);
    });

    // Date change ? instant search
    $(document).on('change', '#sFromDate,#sToDate', function () { loadHistory(1); });

    // Enter key
    $(document).on('keydown', '#sMobile,#sCustName', function (e) {
        if (e.key === 'Enter') { clearTimeout(debTimer); loadHistory(1); }
    });

    // -- Load history ----------------------------------------------------------
    function loadHistory(page) {
        curPage = page;
        $('#histSpinner').show(); $('#histContent').hide(); $('#histPager').empty();

        const params = {
            institutionId,
            page,
            pageSize: PAGE,
            fromDate:     $('#sFromDate').val()  || null,
            toDate:       $('#sToDate').val()    || null,
            customerName: $('#sCustName').val().trim() || null,
            mobile:       $('#sMobile').val().trim()   || null
        };

        $.get('/api/Sms/history', params).done(function (res) {
            $('#histSpinner').hide(); $('#histContent').show();
            $('#histTotal').text(res.total || 0);

            const $b = $('#histBody').empty();
            const mob = ($('#sMobile').val().trim()).toLowerCase();
            const cus = ($('#sCustName').val().trim()).toLowerCase();

            if (!res.data || !res.data.length) {
                $b.append('<tr><td colspan="6" class="no-data"><i class="fas fa-inbox me-2"></i>কোনো SMS ইতিহাস নেই</td></tr>');
                return;
            }

            res.data.forEach(function (r) {
                const phone   = r.PhoneNumber || '';
                const custNm  = (r.CustomerName  || '-');
                const custNo  = r.CustomerNumber ? ' <span style="color:#aaa;font-size:10px;">#' + r.CustomerNumber + '</span>' : '';
                $b.append(
                    '<tr>' +
                    '<td style="font-size:11px;color:#555;white-space:nowrap;">' + (r.SentDate || '') + '</td>' +
                    '<td style="font-weight:600;">' + hl(custNm, cus) + custNo + '</td>' +
                    '<td>' + hl(phone, mob) + '</td>' +
                    '<td class="msg-cell" title="' + (r.TextSMS || '').replace(/"/g, '&quot;') + '">' + (r.TextSMS || '') + '</td>' +
                    '<td style="text-align:center;font-weight:700;color:#6c7ae0;">' + (r.SMSCount || 1) + '</td>' +
                    '<td><span class="badge-sent">' + (r.Status || 'Sent') + '</span></td>' +
                    '</tr>'
                );
            });

            renderPager(res.page, res.totalPages);
        }).fail(function () {
            $('#histSpinner').hide(); $('#histContent').show();
            $('#histBody').html('<tr><td colspan="6" class="no-data" style="color:#dc3545;">সার্ভার এররর, তথ্য লোড হয়নি</td></tr>');
        });
    }

    // highlight matched text
    function hl(text, query) {
        if (!query || !text) return text;
        const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp('(' + esc + ')', 'gi'), '<span class="hl">$1</span>');
    }

    // -- Pager -----------------------------------------------------------------
    function renderPager(page, totalPages) {
        const $w = $('#histPager').empty();
        if (!totalPages || totalPages <= 1) return;
        const $p = $('<div class="d-flex gap-1 flex-wrap align-items-center" style="width:100%;">');
        const btn = (label, pg, dis, active) =>
            $('<button>').html(label).prop('disabled', !!dis).addClass(active ? 'active' : '')
                .on('click', () => loadHistory(pg));
        $p.append(btn('&laquo;', 1, page <= 1));
        $p.append(btn('&lsaquo;', page - 1, page <= 1));
        const s = Math.max(1, page - 2), e = Math.min(totalPages, s + 4);
        for (let i = s; i <= e; i++) $p.append(btn(i, i, false, i === page));
        $p.append(btn('&rsaquo;', page + 1, page >= totalPages));
        $p.append(btn('&raquo;', totalPages, page >= totalPages));
        $p.append('<span class="pager-info">পেইজ ' + page + ' / ' + totalPages + '</span>');
        $w.append($p);
    }

}());
</script>
</body>
</html>
