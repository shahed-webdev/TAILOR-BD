<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার তালিকা - TailorBD</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- jQuery UI CSS for Autocomplete -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/order-list.css">
</head>
<body>
    <!-- Sidebar Container (Auto-loads from component) -->
    <div id="app-sidebar"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Navbar Container (Auto-loads from component) -->
        <div id="app-navbar"></div>

        <!-- Order List Content -->
        <div class="dashboard-content">
            <div class="container-fluid" x-data="orderListData()" x-init="init()">
                <h2 class="page-title mb-4 lang-content" data-en="All Customer Order List" data-bn="সর্ব কাস্টমার অর্ডার তালিকা">সর্ব কাস্টমার অর্ডার তালিকা</h2>

                <!-- Search Type Radio Buttons -->
                <div class="search-type-selector">
                    <label class="radio-option">
                        <input type="radio" name="searchType" value="number" x-model="searchType" @change="onSearchTypeChange">
                        <span class="lang-content" data-en="Order No. And Mobile No." data-bn="অর্ডার নম্বর ও মোবাইল নম্বর">অর্ডার নম্বর ও মোবাইল নম্বর</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="searchType" value="date" x-model="searchType" @change="onSearchTypeChange">
                        <span class="lang-content" data-en="Order Date" data-bn="অর্ডার তারিখ">অর্ডার তারিখ</span>
                    </label>
                </div>

                <!-- Search by Number/Name -->
                <div class="search-section" x-show="searchType === 'number'" x-transition>
                    <div class="search-grid">
                        <div class="form-group">
                            <label class="lang-content" data-en="Mobile Number" data-bn="মোবাইল নম্বর">মোবাইল নম্বর</label>
                            <input type="text" 
                                   id="phoneInput"
                                   x-model="filters.phone" 
                                   @keyup.enter="searchOrders"
                                   @input="clearOtherFields('phone')"
                                   class="form-control"
                                   data-en-placeholder="Mobile Number"
                                   data-bn-placeholder="মোবাইল নম্বর" placeholder="মোবাইল নম্বর">
                        </div>
                        <div class="form-group">
                            <label class="lang-content" data-en="Order Number" data-bn="অর্ডার নম্বর">অর্ডার নম্বর</label>
                            <input type="text" 
                                   id="orderNumberInput"
                                   x-model="filters.orderSerialNumber" 
                                   @keyup.enter="searchOrders"
                                   @input="clearOtherFields('orderNo')"
                                   class="form-control"
                                   data-en-placeholder="Order Number"
                                   data-bn-placeholder="অর্ডার নম্বর" placeholder="অর্ডার নম্বর">
                        </div>
                        <div class="form-group">
                            <label class="lang-content" data-en="Customer Name" data-bn="কাস্টমারের নাম">কাস্টমারের নাম</label>
                            <input type="text" 
                                   id="customerNameInput"
                                   x-model="filters.customerName" 
                                   @keyup.enter="searchOrders"
                                   @input="clearOtherFields('name')"
                                   class="form-control"
                                   data-en-placeholder="Customer Name"
                                   data-bn-placeholder="কাস্টমারের নাম" placeholder="কাস্টমারের নাম">
                        </div>
                        <div class="form-group">
                            <label class="lang-content" data-en="Address" data-bn="ঠিকানা">ঠিকানা</label>
                            <input type="text" 
                                   id="addressInput"
                                   x-model="filters.address" 
                                   @keyup.enter="searchOrders"
                                   @input="clearOtherFields('address')"
                                   class="form-control"
                                   data-en-placeholder="Address"
                                   data-bn-placeholder="ঠিকানা" placeholder="ঠিকানা">
                        </div>
                    </div>
                    <button class="btn btn-primary mt-3" @click="searchOrders" :disabled="isLoading">
                        <span x-show="!isLoading" class="lang-content" data-en="Search" data-bn="অনুসন্ধান">অনুসন্ধান</span>
                        <span x-show="isLoading" class="lang-content" data-en="Loading..." data-bn="লোড হচ্ছে...">লোড হচ্ছে...</span>
                    </button>
                </div>

                <!-- Search by Date -->
                <div class="search-section" x-show="searchType === 'date'" x-transition>
                    <div class="search-grid date-search">
                        <div class="form-group">
                            <label class="lang-content" data-en="Start Date" data-bn="শুরুর তারিখ">শুরুর তারিখ</label>
                            <input type="date" 
                                   x-model="filters.startDate" 
                                   class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="lang-content" data-en="End Date" data-bn="শেষের তারিখ">শেষের তারিখ</label>
                            <input type="date" 
                                   x-model="filters.endDate" 
                                   class="form-control">
                        </div>
                    </div>
                    <button class="btn btn-primary mt-3" @click="searchOrders" :disabled="isLoading">
                        <span x-show="!isLoading" class="lang-content" data-en="Search" data-bn="অনুসন্ধান">অনুসন্ধান</span>
                        <span x-show="isLoading" class="lang-content" data-en="Loading..." data-bn="লোড হচ্ছে...">লোড হচ্ছে...</span>
                    </button>
                </div>

                <!-- Results Summary + Pagination Top -->
                <div class="results-summary mt-4">
                    <div class="total-count">
                        <strong><span class="lang-content" data-en="Total Orders:" data-bn="মোট অর্ডার:">মোট অর্ডার:</span> <span x-text="totalCount"></span> <span class="lang-content" data-en="" data-bn="">৳</span></strong>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <!-- Pagination Top -->
                        <div x-show="totalPages > 1" class="d-flex align-items-center gap-2">
                            <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" class="btn btn-sm btn-outline-secondary">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <span class="page-info-sm"><span x-text="currentPage"></span> / <span x-text="totalPages"></span></span>
                            <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" class="btn btn-sm btn-outline-secondary">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        <span class="legend-item today lang-content" data-en="Today's Order(s)" data-bn="আজকের অর্ডার">আজকের অর্ডার</span>
                    </div>
                </div>

                <!-- Loading State -->
                <div x-show="isLoading" class="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 lang-content" data-en="Loading..." data-bn="লোড হচ্ছে...">লোড হচ্ছে...</p>
                </div>

                <!-- Orders Table -->
                <div x-show="!isLoading" class="table-card mt-3">
                    <template x-if="orders.length === 0">
                        <div class="empty-state">
                            <i class="fas fa-inbox fa-3x mb-3 text-muted"></i>
                            <p class="lang-content" data-en="No orders found!" data-bn="কোনো অর্ডার পাওয়া যায়নি!">কোনো অর্ডার পাওয়া যায়নি!</p>
                        </div>
                    </template>

                    <template x-if="orders.length > 0">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-primary">
                                    <tr>
                                        <th class="no-print text-center" data-en-title="Print" data-bn-title="প্রিন্ট" title="প্রিন্ট"><i class="fas fa-print"></i></th>
                                        <th class="text-center lang-content" data-en="Order No" data-bn="অর্ডার নং">অর্ডার নং</th>
                                        <th class="text-center lang-content" data-en="Name" data-bn="নাম">নাম</th>
                                        <th class="text-center lang-content" data-en="Mobile" data-bn="মোবাইল">মোবাইল</th>
                                        <th class="text-center lang-content" data-en="Address" data-bn="ঠিকানা">ঠিকানা</th>
                                        <th class="text-center"><i class="fas fa-tshirt me-1"></i><span class="lang-content" data-en="Dress" data-bn="ড্রেস">ড্রেস</span></th>
                                        <th class="text-center"><i class="fas fa-calendar-alt me-1"></i><span class="lang-content" data-en="Order" data-bn="অর্ডার">অর্ডার</span></th>
                                        <th class="text-center"><i class="fas fa-truck me-1"></i><span class="lang-content" data-en="Delivery" data-bn="ডেলিভারি">ডেলিভারি</span></th>
                                        <th class="no-print text-center" data-en-title="Update" data-bn-title="আপডেট" title="আপডেট"><i class="fas fa-edit"></i></th>
                                        <th class="no-print text-center" data-en-title="Add Dress" data-bn-title="ড্রেস যোগ করুন" title="ড্রেস যোগ করুন"><i class="fas fa-plus-circle"></i></th>
                                        <th class="no-print text-center" data-en-title="Measurement" data-bn-title="মাপজোখ" title="মাপজোখ"><i class="fas fa-ruler"></i></th>
                                        <th class="no-print text-center" data-en-title="Money Receipt" data-bn-title="মনি রিসিট" title="মনি রিসিট"><i class="fas fa-receipt"></i></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="order in orders" :key="order.orderId">
                                        <tr :class="{ 'table-warning': order.isToday }">
                                            <td class="no-print text-center">
                                                <span class="btn-print-wrapper">
                                                    <a :href="'money-receipt.html?orderId=' + order.orderId + '&tab=measurement'" 
                                                       :class="order.measurementPrintCount > 0 ? 'btn btn-sm btn-outline-secondary' : 'btn btn-sm btn-outline-success'"
                                                       :title="currentLang === 'en' ? 'Print Measurement (' + order.measurementPrintCount + ')' : 'মাপজোখ (' + order.measurementPrintCount + ')'">
                                                        <i class="fas fa-print"></i>
                                                    </a>
                                                    <template x-if="order.measurementPrintCount > 0">
                                                        <span class="measurement-print-count" x-text="order.measurementPrintCount"></span>
                                                    </template>
                                                </span>
                                            </td>
                                            <td class="fw-bold" x-text="order.orderSerialNumber"></td>
                                            <td>
                                                (<span x-text="order.customerNumber"></span>)
                                                <span x-text="order.customerName"></span>
                                            </td>
                                            <td x-text="order.phone"></td>
                                            <td x-text="order.address"></td>
                                            <td x-text="order.details"></td>
                                            <td x-text="formatDate(order.orderDate)"></td>
                                            <td x-text="formatDate(order.updateDeliveryDate || order.deliveryDate)"></td>
                                            <td class="no-print text-center">
                                                <a :href="'update-order.html?OrderID=' + order.orderId"
                                                   class="btn btn-sm btn-warning"
                                                   :title="currentLang === 'en' ? 'Update Order' : 'অর্ডার আপডেট'">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                            </td>
                                            <td class="no-print text-center">
                                                <a :href="'add-more-dress.html?orderId=' + order.orderId + '&customerId=' + order.customerId + '&clothForId=' + order.clothForId" 
                                                   @click="console.log('Add Dress clicked for order:', order.orderId)"
                                                   class="btn btn-sm btn-outline-primary"
                                                   :title="currentLang === 'en' ? 'Add Dress' : 'ড্রেস যোগ করুন'">
                                                    <i class="fas fa-plus"></i>
                                                </a>
                                            </td>
                                            <td class="no-print text-center">
                                                <a :href="'order-edit.html?OrderID=' + order.orderId"
                                                   @click="console.log('Measurement clicked for order:', order.orderId)" 
                                                   class="btn btn-sm btn-outline-warning"
                                                   :title="currentLang === 'en' ? 'Edit Order Measurements' : 'মাপজোখ সম্পাদনা'">
                                                    <i class="fas fa-ruler"></i>
                                                </a>
                                            </td>
                                            <td class="no-print text-center">
                                                <a :href="'finish-order.html?orderId=' + order.orderId" 
                                                   class="btn btn-sm btn-outline-info"
                                                   :title="currentLang === 'en' ? 'Money Receipt' : 'মনি রিসিট'">
                                                    <i class="fas fa-receipt"></i>
                                                </a>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>

                <!-- Pagination Bottom -->
                <div x-show="totalPages > 1" class="d-flex justify-content-center align-items-center gap-2 mt-3 mb-2">
                    <button @click="changePage(1)" :disabled="currentPage === 1" class="btn btn-sm btn-outline-secondary" data-en-title="First" data-bn-title="প্রথম" title="প্রথম">
                        <i class="fas fa-angle-double-left"></i>
                    </button>
                    <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-chevron-left"></i> <span class="lang-content" data-en="Prev" data-bn="পূরবর্তী">পূরবর্তী</span>
                    </button>
                    <span class="page-info">
                        <span class="lang-content" data-en="Page" data-bn="পৃষ্ঠা">পৃষ্ঠা</span> <span x-text="currentPage"></span> / <span x-text="totalPages"></span>
                    </span>
                    <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" class="btn btn-sm btn-outline-secondary">
                        <span class="lang-content" data-en="Next" data-bn="পরে">পরে</span> <i class="fas fa-chevron-right"></i>
                    </button>
                    <button @click="changePage(totalPages)" :disabled="currentPage === totalPages" class="btn btn-sm btn-outline-secondary" data-en-title="Last" data-bn-title="শেষ" title="শেষ">
                        <i class="fas fa-angle-double-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals Container (Auto-loads from component) -->
    <div id="app-modals"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    
    <!-- Shared Components Loader (Must be loaded first) -->
    <script src="/js/app-components.js?v=2.1.7"></script>
    
    <!-- Page Specific JS -->
    <script src="/js/order-list.js?v=2.1.6"></script>
</body>
</html>
