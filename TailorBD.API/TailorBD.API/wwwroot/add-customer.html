<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন কাস্টমার যোগ করুন - TailorBD</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        #app-navbar { margin-left: 260px; transition: margin-left 0.3s ease; }
        .page-container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .card { background: white; border-radius: 8px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #6c7ae0; margin-bottom: 4px; font-size: 20px; font-weight: 700; }
        .customer-no { color: #888; font-size: 13px; margin-bottom: 20px; }
        .customer-no strong { color: #6c7ae0; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; font-size: 13px; }
        .form-group label span.req { color: #dc3545; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px;
            font-size: 14px; font-family: inherit; box-sizing: border-box; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #6c7ae0; box-shadow: 0 0 0 3px rgba(108,122,224,0.12);
        }
        .form-group input.error { border-color: #dc3545; }
        .form-group .error-text { color: #dc3545; font-size: 12px; margin-top: 3px; display: none; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .phone-check-msg { font-size: 12px; margin-top: 4px; }
        .phone-check-msg.exists { color: #856404; }
        .phone-check-msg.ok { color: #155724; }
        .duplicate-msg { background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; padding: 10px 14px; font-size: 13px; color: #856404; margin-bottom: 14px; display: none; }
        .duplicate-msg a { color: #0d6efd; font-weight: 600; }
        .btn-next {
            width: 100%; padding: 11px; background: #6c7ae0; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-next:hover { background: #5a68c9; }
        .btn-next:disabled { background: #aaa; cursor: not-allowed; }
        .divider { border: none; border-top: 1px solid #eee; margin: 18px 0; }
        .gender-options { display: flex; gap: 12px; flex-wrap: wrap; }
        .gender-option { flex: 1; min-width: 80px; }
        .gender-option input[type=radio] { display: none; }
        .gender-option label {
            display: block; text-align: center; padding: 9px 10px;
            border: 2px solid #ddd; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .gender-option input[type=radio]:checked + label {
            border-color: #6c7ae0; background: #f0f2ff; color: #6c7ae0; font-weight: 700;
        }
        @media(max-width:768px) { #app-navbar { margin-left: 0; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <div id="app-navbar"></div>
    <div id="app-sidebar"></div>
    <main class="main-content" id="mainContent">
        <div class="dashboard-content">
            <div class="container">
                <div class="page-container">
                    <div class="card">
                        <h2><i class="fas fa-user-plus me-2"></i>
                            <span data-en="Add New Customer" data-bn="নতুন কাস্টমার যোগ করুন">নতুন কাস্টমার যোগ করুন</span>
                        </h2>
                        <div class="customer-no">
                            <span data-en="Customer No:" data-bn="কাস্টমার নঃ">কাস্টমার নঃ</span>
                            <strong id="customerNo">...</strong>
                        </div>
                        <hr class="divider">

                        <!-- Gender -->
                        <div class="form-group">
                            <label><span data-en="Select Gender" data-bn="লিঙ্গ নির্বাচন করুন">লিঙ্গ নির্বাচন করুন</span></label>
                            <div class="gender-options" id="genderOptions">
                                <div class="gender-option">
                                    <input type="radio" name="gender" id="g_loading" value="" checked disabled>
                                    <label for="g_loading">লোড হচ্ছে...</label>
                                </div>
                            </div>
                        </div>

                        <!-- Customer Name -->
                        <div class="form-group">
                            <label><span data-en="Customer Name" data-bn="কাস্টমারের নাম">কাস্টমারের নাম</span> <span class="req">*</span></label>
                            <input type="text" id="customerName" autocomplete="off"
                                data-en-placeholder="Customer Name" data-bn-placeholder="কাস্টমারের নাম" placeholder="কাস্টমারের নাম">
                            <div class="error-text" id="nameError">নাম দিন</div>
                        </div>

                        <!-- Mobile -->
                        <div class="form-group">
                            <label><span data-en="Mobile Number" data-bn="মোবাইল নম্বর">মোবাইল নম্বর</span> <span class="req">*</span></label>
                            <input type="text" id="mobileNo" autocomplete="off" inputmode="numeric"
                                data-en-placeholder="Mobile Number" data-bn-placeholder="মোবাইল নম্বর" placeholder="বিল হিসাব">
                            <div class="phone-check-msg" id="phoneCheckMsg"></div>
                            <div class="error-text" id="mobileError">বিল হিসাব দিন</div>
                        </div>

                        <!-- Duplicate warning -->
                        <div class="duplicate-msg" id="duplicateMsg"></div>

                        <!-- Address -->
                        <div class="form-group">
                            <label><span data-en="Address" data-bn="ঠিকানা">ঠিকানা</span></label>
                            <textarea id="address" data-en-placeholder="Address" data-bn-placeholder="ঠিকানা" placeholder="ঠিকানা"></textarea>
                        </div>

                        <button type="button" class="btn-next" id="btnNext" onclick="submitCustomer()">
                            <i class="fas fa-arrow-right"></i>
                            <span data-en="Next Step (Add Measurements)" data-bn="পরের ধাপ">পরের ধাপ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="app-modals"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js?v=2.1.7"></script>
    <script src="/js/add-customer.js?v=2.1.6"></script>
</body>
</html>
