<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Shop Data - TailorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/lib/fontawesome/css/all.min.css">
    <link href="/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/authority-profile.css">
    <script src="/js/auth.js?v=2.1.4"></script>
    <script src="/js/authority-layout.js?v=2.1.4" data-page="copy-shop-data"></script>
    <style>
        .copy-card {
            background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.07);
            padding:28px; margin-bottom:20px;
        }
        .copy-title {
            font-size:1rem; font-weight:800; color:#1e293b; margin-bottom:20px;
            display:flex; align-items:center; gap:10px;
        }
        .copy-title i { color:#6366f1; font-size:1.1rem; }
        .copy-title .badge { font-size:.7rem; padding:4px 10px; }

        /* Searchable select */
        .inst-picker { position:relative; }
        .inst-search {
            width:100%; padding:10px 14px 10px 38px; border:1.5px solid #e2e8f0; border-radius:10px;
            font-size:.88rem; font-family:inherit; outline:none; transition:border-color .2s;
        }
        .inst-search:focus { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.1); }
        .inst-search-icon {
            position:absolute; left:12px; top:50%; transform:translateY(-50%);
            color:#94a3b8; font-size:.9rem; pointer-events:none; z-index:2;
        }
        .inst-list {
            position:absolute; top:calc(100% + 4px); left:0; right:0;
            background:#fff; border:1.5px solid #e2e8f0; border-radius:12px;
            box-shadow:0 12px 36px rgba(0,0,0,.14); z-index:999; max-height:300px;
            overflow-y:auto; display:none;
        }
        .inst-list.show { display:block; }
        .inst-opt {
            padding:10px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9;
            display:flex; justify-content:space-between; align-items:center; gap:10px;
            transition:background .15s;
        }
        .inst-opt:last-child { border-bottom:none; }
        .inst-opt:hover { background:#f8fafc; }
        .inst-opt.selected { background:#ede9fe; }
        .inst-opt .io-left { min-width:0; flex:1; }
        .inst-opt .io-name { font-size:.86rem; font-weight:700; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .inst-opt .io-meta { font-size:.72rem; color:#94a3b8; margin-top:1px; }
        .inst-opt .io-right { text-align:right; flex-shrink:0; }
        .inst-opt .io-id { font-size:.75rem; font-weight:800; color:#6366f1; background:#ede9fe; padding:2px 8px; border-radius:99px; }
        .inst-opt .io-stats { font-size:.68rem; color:#94a3b8; margin-top:2px; }

        /* Info box */
        .info-box {
            background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:12px;
            padding:16px 20px; margin-top:14px; display:none;
        }
        .info-box.show { display:block; }
        .info-box.green { border-color:#86efac; background:#f0fdf4; }
        .info-label { font-size:.72rem; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
        .info-val { font-size:1rem; font-weight:700; color:#1e293b; margin-top:2px; }
        .info-val.sm { font-size:.88rem; }

        .arrow-section { display:flex; align-items:center; justify-content:center; padding:20px 0; font-size:2rem; color:#6366f1; }

        .warn-box {
            background:#fefce8; border:1.5px solid #fde047; border-radius:10px;
            padding:12px 16px; margin-top:12px; font-size:.85rem; color:#854d0e;
            display:none; align-items:center; gap:8px;
        }
        .warn-box.show { display:flex; }

        .result-card {
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            border-radius:16px; padding:24px 28px; color:#fff;
            display:none; margin-top:20px;
        }
        .result-card.show { display:block; }
        .result-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:16px; }
        .result-item { text-align:center; }
        .result-item .rv { font-size:1.8rem; font-weight:900; }
        .result-item .rl { font-size:.75rem; opacity:.8; margin-top:4px; }

        .spin-sm {
            width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3);
            border-top-color:#fff; border-radius:50%;
            animation:sp .7s linear infinite; display:inline-block; vertical-align:middle;
        }
        .spin-load {
            width:18px; height:18px; border:2.5px solid #e2e8f0;
            border-top-color:#6366f1; border-radius:50%;
            animation:sp .7s linear infinite; display:inline-block; vertical-align:middle;
        }
        @keyframes sp { to { transform:rotate(360deg); } }

        @media(max-width:768px) {
            .result-grid { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>
<div class="auth-main">
<div class="auth-content">

    <!-- Loading -->
    <div class="text-center py-4" id="pageLoading">
        <span class="spin-load"></span> <span style="font-size:.88rem;color:#94a3b8;margin-left:8px;">প্রতিষ্ঠান লোড হচ্ছে...</span>
    </div>

    <div id="pageBody" style="display:none;">

        <!-- Source -->
        <div class="copy-card">
            <div class="copy-title">
                <i class="fas fa-store"></i> উৎস প্রতিষ্ঠান (যেখান থেকে কপি হবে)
                <span class="badge bg-primary">নির্বাচন করুন</span>
            </div>
            <div class="inst-picker" id="sourcePicker">
                <i class="fas fa-search inst-search-icon"></i>
                <input type="text" class="inst-search" id="sourceSearch" placeholder="প্রতিষ্ঠান নাম / ID / মোবাইল দিয়ে খুঁজুন..." autocomplete="off">
                <div class="inst-list" id="sourceList"></div>
            </div>
            <div class="info-box" id="sourceInfo">
                <div class="row g-3">
                    <div class="col-sm-4"><div class="info-label">প্রতিষ্ঠান</div><div class="info-val" id="srcName">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">Admin</div><div class="info-val sm" id="srcAdmin">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">মোবাইল</div><div class="info-val sm" id="srcPhone">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">পোশাক</div><div class="info-val" id="srcDress">0</div></div>
                    <div class="col-sm-2"><div class="info-label">মাপ</div><div class="info-val" id="srcMeasure">0</div></div>
                </div>
            </div>
        </div>

        <!-- Arrow -->
        <div class="arrow-section"><i class="fas fa-arrow-down"></i></div>

        <!-- Target -->
        <div class="copy-card">
            <div class="copy-title">
                <i class="fas fa-building"></i> উদ্দিষ্ট প্রতিষ্ঠান (যেখানে কপি যাবে)
                <span class="badge bg-success">নির্বাচন করুন</span>
            </div>
            <div class="inst-picker" id="targetPicker">
                <i class="fas fa-search inst-search-icon"></i>
                <input type="text" class="inst-search" id="targetSearch" placeholder="প্রতিষ্ঠান নাম / ID / মোবাইল দিয়ে খুঁজুন..." autocomplete="off">
                <div class="inst-list" id="targetList"></div>
            </div>
            <div class="info-box" id="targetInfo">
                <div class="row g-3">
                    <div class="col-sm-4"><div class="info-label">প্রতিষ্ঠান</div><div class="info-val" id="tgtName">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">Admin</div><div class="info-val sm" id="tgtAdmin">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">মোবাইল</div><div class="info-val sm" id="tgtPhone">&#65533;</div></div>
                    <div class="col-sm-2"><div class="info-label">পোশাক</div><div class="info-val" id="tgtDress">0</div></div>
                    <div class="col-sm-2"><div class="info-label">মাপ</div><div class="info-val" id="tgtMeasure">0</div></div>
                </div>
            </div>
            <div class="warn-box" id="warnBox">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="warnMsg"></span>
                <label style="margin-left:auto;cursor:pointer;font-weight:700;white-space:nowrap;">
                    <input type="checkbox" id="forceCheck" style="margin-right:4px;"> Force কপি
                </label>
            </div>
        </div>

        <!-- Copy Button -->
        <div class="text-center" style="padding:10px 0 20px;">
            <button class="btn btn-lg btn-primary rounded-pill px-5 shadow" id="copyBtn" onclick="executeCopy()" disabled>
                <i class="fas fa-copy me-2"></i> ডাটা কপি করুন
            </button>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard">
            <div style="font-size:1rem;font-weight:800;"><i class="fas fa-check-circle me-2"></i> কপি সফল হয়েছে!</div>
            <div class="result-grid">
                <div class="result-item"><div class="rv" id="resDress">0</div><div class="rl">পোশাক</div></div>
                <div class="result-item"><div class="rv" id="resMeasurement">0</div><div class="rl">মাপ</div></div>
                <div class="result-item"><div class="rv" id="resCategory">0</div><div class="rl">স্টাইল ক্যাটাগরি</div></div>
                <div class="result-item"><div class="rv" id="resStyle">0</div><div class="rl">স্টাইল</div></div>
            </div>
        </div>

    </div>
</div>
</div>

<div id="toastWrap" style="position:fixed;top:18px;right:18px;z-index:9999;"></div>
<script src="/lib/jquery/jquery.min.js"></script>
<script src="/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var allInstitutions = [];
    var selectedSource = null;
    var selectedTarget = null;

    function showToast(msg, type) {
        var cls = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-primary';
        var $t = $('<div class="text-white px-3 py-2 rounded-3 shadow mb-2 ' + cls + '" style="font-size:.85rem;font-weight:600;min-width:220px;">' + msg + '</div>');
        $('#toastWrap').append($t);
        setTimeout(function () { $t.fadeOut(300, function () { $t.remove(); }); }, 3500);
    }

    function esc(s) { return $('<span>').text(s || '').html(); }

    // -- Load institutions --
    function loadInstitutions() {
        $.get('/api/Migration/institutions-list', function (res) {
            $('#pageLoading').hide();
            if (!res.success || !res.data) { showToast('ডাটা লোড হয়নি', 'error'); return; }
            allInstitutions = res.data;
            $('#pageBody').show();
        }).fail(function () {
            $('#pageLoading').html('<span class="text-danger"><i class="fas fa-times-circle me-1"></i> ডাটা লোড ব্যর্থ হয়েছে</span>');
        });
    }

    // -- Render dropdown items --
    function renderList($list, query, excludeId) {
        var q = (query || '').toLowerCase().trim();
        var filtered = allInstitutions.filter(function (inst) {
            if (excludeId && inst.InstitutionID === excludeId) return false;
            if (!q) return true;
            var phone = (inst.Phone || '') + '';
            var name = (inst.InstitutionName || '') + '';
            var admin = (inst.AdminName || '') + '';
            return (inst.InstitutionID + '').indexOf(q) !== -1 ||
                   name.toLowerCase().indexOf(q) !== -1 ||
                   phone.indexOf(q) !== -1 ||
                   admin.toLowerCase().indexOf(q) !== -1;
        });

        if (!filtered.length) {
            $list.html('<div style="padding:14px;text-align:center;color:#94a3b8;font-size:.85rem;">কিছু পাওয়া যায়নি</div>');
        } else {
            var h = '';
            filtered.forEach(function (inst) {
                var phone = (inst.Phone || '-') + '';
                h += '<div class="inst-opt" data-id="' + inst.InstitutionID + '">' +
                    '<div class="io-left">' +
                        '<div class="io-name">' + esc(inst.InstitutionName) + '</div>' +
                        '<div class="io-meta">' + esc(inst.AdminName || '-') + ' &bull; ' + esc(phone) + '</div>' +
                    '</div>' +
                    '<div class="io-right">' +
                        '<div class="io-id">ID: ' + inst.InstitutionID + '</div>' +
                        '<div class="io-stats">পোশাক: ' + (inst.DressCount || 0) + ' &bull; মাপ: ' + (inst.MeasurementCount || 0) + '</div>' +
                    '</div>' +
                '</div>';
            });
            $list.html(h);
        }
        $list.addClass('show');
    }

    // -- Find institution by ID --
    function findInst(id) {
        for (var i = 0; i < allInstitutions.length; i++) {
            if (allInstitutions[i].InstitutionID === id) return allInstitutions[i];
        }
        return null;
    }

    // -- Show info box --
    function showInfo(type, inst) {
        var prefix = type === 'source' ? 'src' : 'tgt';
        var infoId = type === 'source' ? '#sourceInfo' : '#targetInfo';
        $('#' + prefix + 'Name').text(inst.InstitutionName || '-');
        $('#' + prefix + 'Admin').text(inst.AdminName || '-');
        $('#' + prefix + 'Phone').text((inst.Phone || '-') + '');
        $('#' + prefix + 'Dress').text(inst.DressCount || 0);
        $('#' + prefix + 'Measure').text(inst.MeasurementCount || 0);
        $(infoId).addClass('show green');

        if (type === 'target') {
            if ((inst.DressCount || 0) > 0) {
                $('#warnMsg').text('সতর্কতা: তারগেট প্রতিষ্ঠানে ইতিমধ্যে ' + inst.DressCount + ' টি পোশাক আছে!');
                $('#warnBox').addClass('show');
            } else {
                $('#warnBox').removeClass('show');
            }
        }
    }

    // -- Update copy button --
    function updateBtn() {
        var ok = selectedSource && selectedTarget;
        if (ok && selectedSource.InstitutionID === selectedTarget.InstitutionID) ok = false;
        if (ok && (selectedTarget.DressCount || 0) > 0 && !$('#forceCheck').is(':checked')) ok = false;
        if (ok && !selectedTarget.AdminRegistrationId) ok = false;
        $('#copyBtn').prop('disabled', !ok);
    }

    // -- Source picker --
    $('#sourceSearch').on('focus', function () {
        renderList($('#sourceList'), $(this).val(), selectedTarget ? selectedTarget.InstitutionID : null);
    }).on('input', function () {
        renderList($('#sourceList'), $(this).val(), selectedTarget ? selectedTarget.InstitutionID : null);
    });

    $(document).on('click', '#sourceList .inst-opt', function () {
        var id = parseInt($(this).data('id'));
        var inst = findInst(id);
        if (!inst) return;
        selectedSource = inst;
        $('#sourceSearch').val(inst.InstitutionName + ' (ID: ' + inst.InstitutionID + ')');
        $('#sourceList').removeClass('show');
        showInfo('source', inst);
        updateBtn();
    });

    // -- Target picker --
    $('#targetSearch').on('focus', function () {
        renderList($('#targetList'), $(this).val(), selectedSource ? selectedSource.InstitutionID : null);
    }).on('input', function () {
        renderList($('#targetList'), $(this).val(), selectedSource ? selectedSource.InstitutionID : null);
    });

    $(document).on('click', '#targetList .inst-opt', function () {
        var id = parseInt($(this).data('id'));
        var inst = findInst(id);
        if (!inst) return;
        selectedTarget = inst;
        $('#targetSearch').val(inst.InstitutionName + ' (ID: ' + inst.InstitutionID + ')');
        $('#targetList').removeClass('show');
        showInfo('target', inst);

        if (!inst.AdminRegistrationId) {
            showToast('তারগেট প্রতিষ্ঠানের Admin Registration পাওয়া যায়নি!', 'error');
        }
        updateBtn();
    });

    // Close dropdowns on outside click
    $(document).on('click', function (e) {
        if (!$(e.target).closest('#sourcePicker').length) $('#sourceList').removeClass('show');
        if (!$(e.target).closest('#targetPicker').length) $('#targetList').removeClass('show');
    });

    $('#forceCheck').on('change', updateBtn);

    // -- Execute Copy --
    window.executeCopy = function () {
        if (!selectedSource || !selectedTarget) { showToast('উৎস ও উদ্দিষ্ট প্রতিষ্ঠান নির্বাচন করুন', 'error'); return; }
        if (selectedSource.InstitutionID === selectedTarget.InstitutionID) { showToast('উৎস ও উদ্দিষ্ট প্রতিষ্ঠান একটি হতে পারবে না', 'error'); return; }
        if (!selectedTarget.AdminRegistrationId) { showToast('তারগেট প্রতিষ্ঠানের Admin Registration পাওয়া যায়নি', 'error'); return; }

        var srcName = selectedSource.InstitutionName;
        var tgtName = selectedTarget.InstitutionName;
        if (!confirm('"' + srcName + '" থেকে "' + tgtName + '"-এ ডাটা কপি করবেন?')) return;

        var $btn = $('#copyBtn').prop('disabled', true);
        var origHtml = $btn.html();
        $btn.html('<span class="spin-sm"></span> লোড হচ্ছে...');
        $('#resultCard').removeClass('show');

        $.ajax({
            url: '/api/Migration/copy-shop-data',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                SourceInstitutionId: selectedSource.InstitutionID,
                TargetInstitutionId: selectedTarget.InstitutionID,
                TargetRegistrationId: selectedTarget.AdminRegistrationId,
                Force: $('#forceCheck').is(':checked')
            }),
            success: function (res) {
                $btn.prop('disabled', false).html(origHtml);
                if (res.success) {
                    showToast(res.message, 'success');
                    var s = res.stats;
                    $('#resDress').text(s.dresses);
                    $('#resMeasurement').text(s.measurements);
                    $('#resCategory').text(s.styleCategories);
                    $('#resStyle').text(s.styles);
                    $('#resultCard').addClass('show');

                    // Refresh institution list to update counts
                    $.get('/api/Migration/institutions-list', function (r) {
                        if (r.success && r.data) {
                            allInstitutions = r.data;
                            var updated = findInst(selectedTarget.InstitutionID);
                            if (updated) { selectedTarget = updated; showInfo('target', updated); }
                        }
                    });
                } else {
                    showToast(res.message || 'কপি ব্যর্থ হয়েছে', 'error');
                }
                updateBtn();
            },
            error: function (xhr) {
                $btn.prop('disabled', false).html(origHtml);
                var msg = 'সার্ভার এরর, পুনরায় চেষ্টা করুন';
                try { msg = JSON.parse(xhr.responseText).message || msg; } catch (e) {}
                showToast(msg, 'error');
                updateBtn();
            }
        });
    };

    $(document).ready(function () {
        if (!TailorAuth.guard('Authority')) return;
        loadInstitutions();
    });
})();
</script>
</body>
</html>
