<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্টাইল ক্যাটাগরি - TailorBD</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="/css/dashboard.css" rel="stylesheet">
    <style>
        /* -- Compact page overrides -- */
        .page-header { margin-bottom: 16px !important; }
        .page-header h1 { font-size: 1.3rem; margin-bottom: 2px; }
        .page-header p   { font-size: .85rem; margin: 0; }

        /* Add-form card */
        .add-form-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e3e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            margin-bottom: 16px;
        }
        .add-form-card .card-header {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px 10px 0 0;
            font-size: .9rem;
            font-weight: 600;
        }
        .add-form-card .card-body { padding: 12px 16px; }

        /* Table card */
        .table-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e3e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            padding: 0;
            overflow: hidden;
        }
        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #e3e8f0;
            background: #f8f9ff;
        }
        .table-card-header h6 { margin: 0; font-weight: 600; color: #444; font-size: .95rem; }

        /* Compact table */
        #categoriesTable { margin: 0; font-size: .875rem; }
        #categoriesTable thead tr {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }
        #categoriesTable thead th {
            color: #fff; font-weight: 600;
            padding: 8px 12px;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .4px;
            white-space: nowrap;
            border: none;
        }
        #categoriesTable tbody td {
            padding: 7px 12px;
            vertical-align: middle;
            border-color: #f0f0f0;
        }
        #categoriesTable tbody tr:hover { background: #f8f9ff; }

        /* Serial input */
        .serial-input {
            width: 68px !important;
            text-align: center;
            padding: 3px 6px;
            font-size: .85rem;
        }

        /* Compact buttons */
        .btn-action {
            padding: 3px 8px;
            font-size: .78rem;
            border-radius: 5px;
            line-height: 1.4;
        }
        .btn-add-design {
            padding: 4px 10px;
            font-size: .8rem;
            border-radius: 5px;
            background: linear-gradient(135deg,#10b981,#059669);
            border: none;
            color: #fff;
            white-space: nowrap;
        }
        .btn-add-design:hover { opacity: .9; color: #fff; }

        /* Update serial btn */
        #updateSerialsBtn {
            padding: 5px 14px;
            font-size: .82rem;
        }
    </style>
</head>
<body>
    <!-- Sidebar Container (Auto-loads from component) -->
    <div id="app-sidebar"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Navbar Container (Auto-loads from component) -->
        <div id="app-navbar"></div>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Page Header -->
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h1 data-en="Style Categories" data-bn="স্টাইল ক্যাটাগরি">স্টাইল ক্যাটাগরি</h1>
                    <p class="text-muted" id="dressNameHeader"></p>
                </div>
                <a href="/dress-add.html" class="btn btn-sm btn-secondary">
                    <i class="fas fa-arrow-left me-1"></i> ফিরে যান
                </a>
            </div>

            <!-- Add Category Form -->
            <div class="add-form-card">
                <div class="card-header">
                    <i class="fas fa-plus-circle me-1"></i> নতুন স্টাইল ক্যাটাগরি যোগ করুন
                </div>
                <div class="card-body">
                    <form id="addCategoryForm">
                        <div class="row g-2 align-items-end">
                            <div class="col-sm-5">
                                <label class="form-label form-label-sm mb-1">ক্যাটাগরির নাম</label>
                                <input type="text" class="form-control form-control-sm" id="categoryName"
                                       placeholder="যেমন: ডিজাইন, পকেট, কলার..." required>
                            </div>
                            <div class="col-sm-3">
                                <label class="form-label form-label-sm mb-1">ক্রমিক নম্বর</label>
                                <input type="number" class="form-control form-control-sm" id="categorySerial"
                                       placeholder="১, ২, ৩..." min="1">
                            </div>
                            <div class="col-sm-4">
                                <button type="submit" class="btn btn-primary btn-sm w-100">
                                    <i class="fas fa-plus me-1"></i> ক্যাটাগরি যোগ করুন
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Categories Table -->
            <div class="table-card">
                <div class="table-card-header">
                    <h6><i class="fas fa-list me-2 text-primary"></i>স্টাইল ক্যাটাগরি তালিকা</h6>
                    <button type="button" class="btn btn-success btn-sm" id="updateSerialsBtn" style="display:none;">
                        <i class="fas fa-save me-1"></i> ক্রমিক আপডেট করুন
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover" id="categoriesTable">
                        <thead>
                            <tr>
                                <th style="width:60px;">নির্বাচন</th>
                                <th>ক্যাটাগরির নাম</th>
                                <th style="width:160px;">ডিজাইন যোগ করুন</th>
                                <th style="width:90px;">ক্রমিক</th>
                                <th style="width:60px;">মুছুন</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <span class="spinner-border spinner-border-sm me-2"></span> লোড হচ্ছে...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals Container (Auto-loads from component) -->
    <div id="app-modals"></div>

    <!-- Edit Category Modal -->
    <div class="modal fade" id="editCategoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header py-2" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;">
                    <h6 class="modal-title mb-0"><i class="fas fa-edit me-1"></i> ক্যাটাগরি সম্পাদনা</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editCategoryId">
                    <div class="mb-3">
                        <label class="form-label">ক্যাটাগরির নাম</label>
                        <input type="text" class="form-control" id="editCategoryName" required>
                    </div>
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">বাতিল</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="updateCategory()">
                        <i class="fas fa-save me-1"></i> সংরক্ষণ করুন
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- App Components -->
    <script src="/js/app-components.js?v=2.1.4"></script>

    <!-- Dress Style Add JS -->
    <script src="/js/dress-style-add.js?v=2.1.4"></script>
</body>
</html>
