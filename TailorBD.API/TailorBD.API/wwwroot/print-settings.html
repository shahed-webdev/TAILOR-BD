<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিন্ট সেটিংস - TailorBD</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Sidebar Container -->
    <div id="app-sidebar"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Navbar Container -->
        <div id="app-navbar"></div>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 data-en="Print Settings" data-bn="প্রিন্ট সেটিংস">প্রিন্ট সেটিংস</h1>
                <p class="text-muted" data-en="Change money receipt and measurement print settings" data-bn="মনি রিসিট ও মাপজোখ প্রিন্ট সেটিংস পরিবর্তন করুন">মনি রিসিট ও মাপজোখ প্রিন্ট সেটিংস পরিবর্তন করুন</p>
            </div>

            <!-- Settings Tabs -->
            <ul class="nav nav-tabs mb-4" id="settingsTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="measurement-settings-tab" data-bs-toggle="tab" 
                            data-bs-target="#measurementSettings" type="button" role="tab">
                        <i class="fas fa-ruler me-2"></i><span data-en="Measurement Print Settings" data-bn="মাপজোখ প্রিন্ট সেটিংস">মাপজোখ প্রিন্ট সেটিংস</span>
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="receipt-settings-tab" data-bs-toggle="tab" 
                            data-bs-target="#receiptSettings" type="button" role="tab">
                        <i class="fas fa-receipt me-2"></i><span data-en="Money Receipt Settings" data-bn="মনি রিসিট সেটিংস">মনি রিসিট সেটিংস</span>
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="settingsTabContent">
                <!-- Measurement Print Settings -->
                <div class="tab-pane fade show active" id="measurementSettings" role="tabpanel">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-en="Measurement Print Settings (Select for printing)" data-bn="মাপজোখ প্রিন্ট সেটিংস (প্রিন্টের জন্য নির্বাচন করুন)">মাপজোখ প্রিন্ট সেটিংস (প্রিন্টের জন্য নির্বাচন করুন)</h5>
                        </div>
                        <div class="card-body">
                            <form id="measurementSettingsForm">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printShopName">
                                                <label class="form-check-label" for="printShopName" data-en="Shop Name" data-bn="দোকানের নাম">
                                                    দোকানের নাম
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printMasterCopy">
                                                <label class="form-check-label" for="printMasterCopy" data-en="Additional(......)Copy" data-bn="অতিরিক্ত(...)কপি">
                                                    অতিরিক্ত(...)কপি
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printWorkmanCopy">
                                                <label class="form-check-label" for="printWorkmanCopy" data-en="Workman Copy" data-bn="কারিগর কপি">
                                                    কারিগর কপি
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printShopCopy">
                                                <label class="form-check-label" for="printShopCopy" data-en="Shop Copy" data-bn="দোকান কপি">
                                                    দোকান কপি
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printCustomerName">
                                                <label class="form-check-label" for="printCustomerName" data-en="Customer Name" data-bn="কাস্টমারের নাম">
                                                    কাস্টমারের নাম
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printCustomerPhone">
                                                <label class="form-check-label" for="printCustomerPhone" data-en="Customer Mobile" data-bn="কাস্টমারের মোবাইল">
                                                    কাস্টমারের মোবাইল
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printCustomerAddress">
                                                <label class="form-check-label" for="printCustomerAddress" data-en="Customer Address" data-bn="কাস্টমারের ঠিকানা">
                                                    কাস্টমারের ঠিকানা
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printMeasurementName">
                                                <label class="form-check-label" for="printMeasurementName" data-en="Measurement with Name" data-bn="নামসহ মাপজোখ">
                                                    নামসহ মাপজোখ
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printStyleCategory">
                                                <label class="form-check-label" for="printStyleCategory" data-en="Style with Category Name" data-bn="ক্যাটাগরি নামসহ স্টাইল">
                                                    ক্যাটাগরি নামসহ স্টাইল
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="printBarcode">
                                                <label class="form-check-label" for="printBarcode" data-en="Order Number Barcode" data-bn="অর্ডার নম্বর বারকোড">
                                                    অর্ডার নম্বর বারকোড
                                                </label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label for="measurementTopSpace" class="form-label" data-en="Top Space" data-bn="উপরের ফাঁকা জায়গা">উপরের ফাঁকা জায়গা</label>
                                            <div class="input-group">
                                                <input type="number" class="form-control" id="measurementTopSpace" 
                                                       min="0" max="200" value="0">
                                                <span class="input-group-text">px</span>
                                            </div>
                                            <small class="text-muted" data-en="Enter between 0 to 200" data-bn="০ থেকে ২০০ এর মধ্যে দিন">০ থেকে ২০০ এর মধ্যে দিন</small>
                                        </div>

                                        <div class="mb-3">
                                            <label for="measurementFontSize" class="form-label" data-en="Measurement Font Size" data-bn="মাপজোখ ফন্ট সাইজ">মাপজোখ ফন্ট সাইজ</label>
                                            <select class="form-select" id="measurementFontSize">
                                                <option value="11">11 PX</option>
                                                <option value="12">12 PX</option>
                                                <option value="13">13 PX</option>
                                                <option value="14" selected>14 PX</option>
                                                <option value="16">16 PX</option>
                                                <option value="18">18 PX</option>
                                                <option value="19">19 PX</option>
                                                <option value="20">20 PX</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="text-end">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-2"></i><span data-en="Save" data-bn="সেভ করুন">সেভ করুন</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Money Receipt Print Settings -->
                <div class="tab-pane fade" id="receiptSettings" role="tabpanel">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-en="Money Receipt Print Settings" data-bn="মনি রিসিট প্রিন্ট সেটিংস">মনি রিসিট প্রিন্ট সেটিংস</h5>
                        </div>
                        <div class="card-body">
                            <form id="receiptSettingsForm">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="showShopName">
                                                <label class="form-check-label" for="showShopName" data-en="Shop Name" data-bn="দোকানের নাম">দোকানের নাম</label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="showServedBy">
                                                <label class="form-check-label" for="showServedBy" data-en="Served By" data-bn="সেবা প্রদানকারী">সেবা প্রদানকারী</label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="showReceiptBarcode">
                                                <label class="form-check-label" for="showReceiptBarcode" data-en="Order Number Barcode" data-bn="অর্ডার নম্বর বারকোড">অর্ডার নম্বর বারকোড</label>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label for="receiptTopSpace" class="form-label" data-en="Top Space" data-bn="উপরের ফাঁকা জায়গা">উপরের ফাঁকা জায়গা</label>
                                            <div class="input-group">
                                                <input type="number" class="form-control" id="receiptTopSpace" 
                                                       min="0" max="200" value="0">
                                                <span class="input-group-text">px</span>
                                            </div>
                                            <small class="text-muted" data-en="Enter between 0 to 200" data-bn="০ থেকে ২০০ এর মধ্যে দিন">০ থেকে ২০০ এর মধ্যে দিন</small>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="receiptFontSize" class="form-label" data-en="Font Size" data-bn="ফন্ট সাইজ">ফন্ট সাইজ</label>
                                            <select class="form-select" id="receiptFontSize">
                                                <option value="11">11 PX</option>
                                                <option value="12">12 PX</option>
                                                <option value="13">13 PX</option>
                                                <option value="14" selected>14 PX</option>
                                                <option value="16">16 PX</option>
                                                <option value="18">18 PX</option>
                                                <option value="19">19 PX</option>
                                                <option value="20">20 PX</option>
                                            </select>
                                        </div>

                                        <div class="mb-3">
                                            <label for="poweredByInfo" class="form-label" data-en="Powered By Info" data-bn="পাওয়ার্ড বাই তথ্য">পাওয়ার্ড বাই তথ্য</label>
                                            <textarea class="form-control" id="poweredByInfo" rows="3" 
                                                      data-en-placeholder="Enter powered by information" data-bn-placeholder="পাওয়ার্ড বাই তথ্য লিখুন"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="text-end">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-2"></i><span data-en="Save" data-bn="সেভ করুন">সেভ করুন</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="app-modals"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Components -->
    <script src="/js/app-components.js?v=2.1.7"></script>
    
    <!-- Print Settings JS -->
    <script src="/js/print-settings.js?v=2.1.6"></script>
</body>
</html>
