<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড - TailorBD | সাব-অ্যাডমিন</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Same base layout CSS as dashboard.html -->
    <link href="/css/dashboard.css" rel="stylesheet">

    <script src="/js/auth.js"></script>

    <style>
        /* ── Institution card ─────────────────────────────── */
        .inst-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(102,126,234,.12);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
            position: relative;
        }
        .inst-card .inst-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e0e7ff;
            background: #f1f5f9;
            flex-shrink: 0;
        }
        .inst-card .inst-logo-placeholder {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        .inst-card .inst-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 4px;
        }
        .inst-card .inst-info p {
            font-size: .83rem;
            color: #64748b;
            margin: 0;
            line-height: 1.5;
        }
        .inst-card .inst-info p i { margin-right: 5px; color: #667eea; }

        /* ── Section heading ──────────────────────────────── */
        .section-heading {
            font-size: 1rem;
            font-weight: 700;
            color: #334155;
            margin: 0 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-heading i { color: #667eea; }

        /* ── Quick-links grid ─────────────────────────────── */
        .ql-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);   /* mobile: 2 col */
            gap: 14px;
            margin-bottom: 32px;
        }
        @media (min-width: 576px) {
            .ql-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        @media (min-width: 768px) {
            .ql-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
        }
        @media (min-width: 1024px) {
            .ql-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; }
        }
        @media (min-width: 1280px) {
            .ql-grid { grid-template-columns: repeat(6, 1fr); gap: 20px; }
        }

        /* ── Quick-link card ──────────────────────────────── */
        .ql-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 10px rgba(102,126,234,.10);
            padding: 20px 12px 16px;
            text-align: center;
            text-decoration: none;
            color: #1e293b;
            transition: transform .18s, box-shadow .18s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1.5px solid transparent;
        }
        .ql-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(102,126,234,.22);
            border-color: #667eea;
            color: #667eea;
            text-decoration: none;
        }
        .ql-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            flex-shrink: 0;
        }
        .ql-card span {
            font-size: .82rem;
            font-weight: 600;
            line-height: 1.3;
            color: #334155;
        }
        .ql-card:hover span { color: #4f46e5; }

        /* icon bg colours — cycle through palette */
        .ic-0  { background: linear-gradient(135deg,#667eea,#764ba2); }
        .ic-1  { background: linear-gradient(135deg,#06b6d4,#0891b2); }
        .ic-2  { background: linear-gradient(135deg,#10b981,#059669); }
        .ic-3  { background: linear-gradient(135deg,#f59e0b,#d97706); }
        .ic-4  { background: linear-gradient(135deg,#ef4444,#dc2626); }
        .ic-5  { background: linear-gradient(135deg,#8b5cf6,#7c3aed); }
        .ic-6  { background: linear-gradient(135deg,#ec4899,#db2777); }
        .ic-7  { background: linear-gradient(135deg,#14b8a6,#0d9488); }
        .ic-8  { background: linear-gradient(135deg,#f97316,#ea580c); }
        .ic-9  { background: linear-gradient(135deg,#6366f1,#4f46e5); }
        .ic-10 { background: linear-gradient(135deg,#22c55e,#16a34a); }
        .ic-11 { background: linear-gradient(135deg,#0ea5e9,#0284c7); }

        /* ── No-access message ────────────────────────────── */
        .no-access-msg {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .no-access-msg i { font-size: 3rem; margin-bottom: 16px; display: block; }

        /* ── Loading skeleton ─────────────────────────────── */
        .ql-skeleton {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        @media (min-width: 576px) { .ql-skeleton { grid-template-columns: repeat(3,1fr); } }
        @media (min-width: 768px) { .ql-skeleton { grid-template-columns: repeat(4,1fr); } }
        .sk-item {
            background: #f1f5f9;
            border-radius: 16px;
            height: 110px;
            animation: skPulse 1.4s ease-in-out infinite;
        }
        @keyframes skPulse {
            0%,100% { opacity: 1; } 50% { opacity: .45; }
        }
    </style>
</head>
<body>
    <!-- Sidebar (same as dashboard.html — loaded from shared component) -->
    <div id="app-sidebar"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Navbar (shared component) -->
        <div id="app-navbar"></div>

        <!-- Page Body -->
        <div class="dashboard-content">
            <div id="alertContainer"></div>

            <!-- Institution Info Card -->
            <div class="inst-card" id="instCard" style="display:none;">
                <div class="inst-logo-placeholder" id="instLogoPlaceholder">
                    <i class="fas fa-store"></i>
                </div>
                <img id="instLogoImg" class="inst-logo" src="" alt="logo" style="display:none;"
                     onerror="this.style.display='none';document.getElementById('instLogoPlaceholder').style.display='flex';">
                <div class="inst-info">
                    <h3 id="instName">প্রতিষ্ঠানের নাম লোড হচ্ছে...</h3>
                    <p id="instAddress" style="display:none;"><i class="fas fa-map-marker-alt"></i><span></span></p>
                    <p id="instPhone"   style="display:none;"><i class="fas fa-phone"></i><span></span></p>
                </div>
            </div>

            <!-- Quick Links Section -->
            <div class="section-heading">
                <i class="fas fa-th-large"></i>
                <span class="lang-content" data-en="Quick Links" data-bn="কুইক লিংক">কুইক লিংক</span>
            </div>

            <!-- Skeleton while loading -->
            <div class="ql-skeleton" id="qlSkeleton">
                <div class="sk-item"></div><div class="sk-item"></div>
                <div class="sk-item"></div><div class="sk-item"></div>
                <div class="sk-item"></div><div class="sk-item"></div>
            </div>

            <!-- Actual quick links grid -->
            <div class="ql-grid" id="qlGrid" style="display:none;"></div>

            <!-- Shown if no permissions at all -->
            <div class="no-access-msg" id="noAccessMsg" style="display:none;">
                <i class="fas fa-lock"></i>
                <p class="lang-content"
                   data-en="No pages have been assigned to you yet. Please contact your admin."
                   data-bn="এখনো কোনো পেজের অ্যাক্সেস দেওয়া হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।">
                    এখনো কোনো পেজের অ্যাক্সেস দেওয়া হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।
                </p>
            </div>
        </div><!-- /dashboard-content -->
    </main>

    <div id="app-modals"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js"></script>
    <script src="/js/due-notice.js"></script>

    <script>
    (function () {
        'use strict';

        // Trigger due notice after session is ready
        $(document).ready(function () {
            // Small delay to ensure sessionStorage is populated
            setTimeout(function () {
                if (window.DueNotice) {
                    DueNotice.init();
                }
            }, 1500);
        });

        // ── icon map: pageURL fragment → FA icon class ──────────────────────
        var ICON_MAP = [
            { test: /new-order|quick-order/,           icon: 'fa-plus-circle' },
            { test: /order-list|order/,                icon: 'fa-list-alt' },
            { test: /delivery-give|delivery/,          icon: 'fa-truck' },
            { test: /delivered/,                       icon: 'fa-check-circle' },
            { test: /add-customer|customer/,           icon: 'fa-user-plus' },
            { test: /customer-list/,                   icon: 'fa-users' },
            { test: /dress-add|dress/,                 icon: 'fa-tshirt' },
            { test: /tailor-info/,                     icon: 'fa-store' },
            { test: /sub-admin/,                       icon: 'fa-user-shield' },
            { test: /access-management/,               icon: 'fa-key' },
            { test: /item-sell\b|sell-item/,           icon: 'fa-tags' },
            { test: /item-purchase/,                   icon: 'fa-shopping-bag' },
            { test: /item-stock/,                      icon: 'fa-boxes' },
            { test: /item/,                            icon: 'fa-store-alt' },
            { test: /invoice/,                         icon: 'fa-file-invoice' },
            { test: /expense|expanse/,                 icon: 'fa-file-invoice-dollar' },
            { test: /income/,                          icon: 'fa-hand-holding-usd' },
            { test: /account/,                         icon: 'fa-calculator' },
            { test: /report/,                          icon: 'fa-chart-bar' },
            { test: /sms|message/,                     icon: 'fa-sms' },
            { test: /contact/,                         icon: 'fa-address-book' },
            { test: /employee/,                        icon: 'fa-user-tie' },
            { test: /incomplete|work/,                 icon: 'fa-tasks' },
            { test: /change-delivery|change/,          icon: 'fa-calendar-alt' },
            { test: /delete/,                          icon: 'fa-trash-alt' },
            { test: /transaction/,                     icon: 'fa-exchange-alt' }
        ];

        function iconFor(url) {
            url = (url || '').toLowerCase();
            for (var i = 0; i < ICON_MAP.length; i++) {
                if (ICON_MAP[i].test.test(url)) return ICON_MAP[i].icon;
            }
            return 'fa-link';
        }

        // colour class cycling
        function colourClass(idx) {
            return 'ic-' + (idx % 12);
        }

        // ── Page titles (Bengali preferred) ─────────────────────────────────
        var TITLE_MAP = {
            '/new-order.html':            { bn: 'নতুন অর্ডার',        en: 'New Order' },
            '/quick-order.html':          { bn: 'কুইক অর্ডার',        en: 'Quick Order' },
            '/order-list.html':           { bn: 'অর্ডার তালিকা',      en: 'Order List' },
            '/delivery-give.html':        { bn: 'ডেলিভারি দিন',       en: 'Delivery Give' },
            '/delivered-orders.html':     { bn: 'ডেলিভারি তালিকা',    en: 'Delivered' },
            '/add-customer.html':         { bn: 'কাস্টমার যুক্ত করুন', en: 'Add Customer' },
            '/customer-list.html':        { bn: 'কাস্টমার তালিকা',    en: 'Customer List' },
            '/dress-add.html':            { bn: 'পোষাক ও মাপ',        en: 'Dress & Measure' },
            '/tailor-info.html':          { bn: 'প্রতিষ্ঠানের তথ্য',  en: 'Tailor Info' },
            '/sub-admin.html':            { bn: 'সাব-অ্যাডমিন',       en: 'Sub Admin' },
            '/access-management.html':    { bn: 'অ্যাক্সেস নিয়ন্ত্রণ', en: 'Access Mgmt' },
            '/item-sell.html':            { bn: 'আইটেম বিক্রি',       en: 'Sell Item' },
            '/item-purchase.html':        { bn: 'আইটেম ক্রয়',         en: 'Purchase Item' },
            '/item-stock-report.html':    { bn: 'স্টক রিপোর্ট',       en: 'Stock Report' },
            '/add-expense.html':          { bn: 'খরচ যুক্ত করুন',     en: 'Add Expense' },
            '/add-other-income.html':     { bn: 'অন্যান্য আয়',        en: 'Other Income' },
            '/income-expense-report.html':{ bn: 'আয় ও ব্যয়',         en: 'Income/Expense' },
            '/sms.html':                  { bn: 'এসএমএস পাঠান',       en: 'Send SMS' },
            '/sms-history.html':          { bn: 'এসএমএস ইতিহাস',      en: 'SMS History' },
            '/contact-list.html':         { bn: 'কন্টাক্ট লিস্ট',     en: 'Contacts' },
            '/employee.html':             { bn: 'কর্মচারীর হিসাব',    en: 'Employee' },
            '/incomplete-works.html':     { bn: 'কাজ সম্পূর্ণ করুন',  en: 'Complete Works' },
            '/change-delivery-date.html': { bn: 'ডেলিভারি তারিখ',     en: 'Change Delivery' },
            '/account-management.html':   { bn: 'একাউন্ট',            en: 'Account Mgmt' },
            '/account-log.html':          { bn: 'একাউন্ট লগ',         en: 'Account Log' },
            '/transaction-log.html':      { bn: 'লেনদেন লগ',          en: 'Transactions' },
            '/income-due-expense.html':   { bn: 'জমা, বাকি ও খরচ',    en: 'Due & Expense' },
            '/due-invoice.html':          { bn: 'ডিউ ইনভয়েস',         en: 'Due Invoice' },
            '/paid-invoice.html':         { bn: 'পেইড ইনভয়েস',        en: 'Paid Invoice' }
        };

        function labelFor(url, pageTitle) {
            var key = (url || '').toLowerCase();
            if (!key.startsWith('/')) key = '/' + key;
            var lang = localStorage.getItem('preferredLanguage') || 'bn';
            if (TITLE_MAP[key]) return TITLE_MAP[key][lang] || TITLE_MAP[key].bn;
            return pageTitle || key;
        }

        // ── Render quick links ───────────────────────────────────────────────
        function renderLinks(pages) {
            var $grid     = $('#qlGrid');
            var $skeleton = $('#qlSkeleton');
            var $noAccess = $('#noAccessMsg');

            $skeleton.hide();

            if (!pages || !pages.length) {
                $noAccess.show();
                return;
            }

            $grid.empty();
            pages.forEach(function (p, idx) {
                // API now always returns .html URLs (mapped by server)
                var url   = (p.pageURL   || p.PageURL   || '#').trim();
                // Prefer DB PageTitle; fall back to our local map; fall back to url basename
                var dbTitle = (p.pageTitle || p.PageTitle || '').trim();
                var label = dbTitle || labelFor(url, url);
                var icon  = iconFor(url);
                var col   = colourClass(idx);

                // Ensure absolute path
                if (url !== '#' && !url.startsWith('/') && !url.startsWith('http')) {
                    url = '/' + url;
                }

                var $a = $('<a>')
                    .addClass('ql-card')
                    .attr('href', url)
                    .html(
                        '<div class="ql-icon ' + col + '"><i class="fas ' + icon + '"></i></div>' +
                        '<span>' + $('<span>').text(label).html() + '</span>'
                    );
                $grid.append($a);
            });

            $grid.show();
        }

        // ── Load institution info ────────────────────────────────────────────
        function loadInstInfo(institutionId) {
            $.ajax({
                url: '/api/institution/' + institutionId,
                method: 'GET',
                success: function (r) {
                    if (!r.success || !r.data) return;
                    var d = r.data;
                    $('#instName').text(d.institutionName || '');

                    if (d.address) {
                        $('#instAddress').show().find('span').text(d.address);
                    }
                    if (d.phone) {
                        $('#instPhone').show().find('span').text(d.phone);
                    }

                    // Try logo
                    var logoUrl = '/api/institution/' + institutionId + '/logo';
                    var $img = $('#instLogoImg');
                    $img.attr('src', logoUrl)
                        .on('load', function () {
                            $(this).show();
                            $('#instLogoPlaceholder').hide();
                        });

                    $('#instCard').show();
                }
            });
        }

        // ── Main init ────────────────────────────────────────────────────────
        $(document).ready(function () {
            // Auth guard
            if (!TailorAuth.guard()) return;

            var category       = sessionStorage.getItem('category');
            var institutionId  = sessionStorage.getItem('institutionId');
            var registrationId = sessionStorage.getItem('registrationId');

            // Redirect wrong roles
            if (category === 'Authority') {
                window.location.replace('/authority-profile.html'); return;
            }
            if (category === 'Sub-Authority') {
                window.location.replace('/authority-sub-profile.html'); return;
            }
            if (category === 'Admin' || category === 'Full-Admin') {
                window.location.replace('/dashboard.html'); return;
            }

            if (!institutionId || !registrationId) {
                window.location.replace('/login.html'); return;
            }

            // Load institution card
            loadInstInfo(institutionId);

            // Invoice pages are always accessible (no permission needed)
            var invoicePages = [
                { pageURL: '/due-invoice.html',  pageTitle: 'ডিউ ইনভয়েস' },
                { pageURL: '/paid-invoice.html', pageTitle: 'পেইড ইনভয়েস' }
            ];

            // Load permissions and render quick links
            $.ajax({
                url: '/api/access/permissions/' + institutionId + '/' + registrationId,
                method: 'GET',
                success: function (r) {
                    if (r.success && r.data && r.data.length) {
                        // De-duplicate by pageURL
                        var seen = {};
                        var pages = [];
                        r.data.forEach(function (p) {
                            var url = (p.pageURL || p.PageURL || '').toLowerCase();
                            if (url && !seen[url]) {
                                seen[url] = true;
                                pages.push(p);
                            }
                        });

                        // Add invoice pages if not already present
                        invoicePages.forEach(function (ip) {
                            if (!seen[ip.pageURL.toLowerCase()]) {
                                seen[ip.pageURL.toLowerCase()] = true;
                                pages.push(ip);
                            }
                        });

                        renderLinks(pages);
                    } else {
                        // No permissions at all, still show invoice pages
                        renderLinks(invoicePages);
                    }
                },
                error: function () {
                    // On error, still show invoice pages
                    renderLinks(invoicePages);
                }
            });
        });

        // Re-render labels when language changes
        $(document).on('languageChanged', function () {
            // Simplest: reload the grid by re-triggering the AJAX
            // (data is tiny, safe to reload)
            var institutionId  = sessionStorage.getItem('institutionId');
            var registrationId = sessionStorage.getItem('registrationId');
            if (!institutionId || !registrationId) return;

            var invoicePages = [
                { pageURL: '/due-invoice.html',  pageTitle: 'ডিউ ইনভয়েস' },
                { pageURL: '/paid-invoice.html', pageTitle: 'পেইড ইনভয়েস' }
            ];

            $.ajax({
                url: '/api/access/permissions/' + institutionId + '/' + registrationId,
                method: 'GET',
                success: function (r) {
                    if (r.success && r.data && r.data.length) {
                        var seen = {}, pages = [];
                        r.data.forEach(function (p) {
                            var url = (p.pageURL || p.PageURL || '').toLowerCase();
                            if (url && !seen[url]) { seen[url] = true; pages.push(p); }
                        });

                        invoicePages.forEach(function (ip) {
                            if (!seen[ip.pageURL.toLowerCase()]) {
                                seen[ip.pageURL.toLowerCase()] = true;
                                pages.push(ip);
                            }
                        });

                        renderLinks(pages);
                    } else {
                        renderLinks(invoicePages);
                    }
                },
                error: function () {
                    renderLinks(invoicePages);
                }
            });
        });
    })();
    </script>
</body>
</html>
