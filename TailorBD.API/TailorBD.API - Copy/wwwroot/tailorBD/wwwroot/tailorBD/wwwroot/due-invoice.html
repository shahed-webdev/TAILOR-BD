<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Due Invoices - TailorBD" data-bn="ডিউ ইনভয়েস - TailorBD">ডিউ ইনভয়েস - TailorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <style>
        .invoice-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(102,126,234,.10);
            padding: 24px;
            margin-bottom: 20px;
        }
        .invoice-card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .invoice-card .card-title i { color: #ef4444; }

        .summary-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .summary-item {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border-radius: 10px;
            padding: 14px 20px;
            min-width: 160px;
            flex: 1;
        }
        .summary-item.paid-bg {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
        }
        .summary-item label { font-size: .78rem; color: #64748b; font-weight: 500; display: block; margin-bottom: 2px; }
        .summary-item .val { font-size: 1.2rem; font-weight: 800; color: #dc2626; }
        .summary-item.paid-bg .val { color: #16a34a; }

        .inv-table { width: 100%; border-collapse: collapse; }
        .inv-table thead th {
            background: #f8fafc;
            padding: 10px 12px;
            font-size: .8rem;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }
        .inv-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
        .inv-table tbody tr:hover { background: #f8fafc; }
        .inv-table tbody td { padding: 10px 12px; font-size: .85rem; color: #334155; vertical-align: middle; }

        .badge-due { background: #fef2f2; color: #dc2626; font-weight: 600; padding: 4px 10px; border-radius: 6px; font-size: .75rem; }
        .badge-partial { background: #fffbeb; color: #d97706; font-weight: 600; padding: 4px 10px; border-radius: 6px; font-size: .75rem; }

        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; color: #cbd5e1; }

        .btn-detail {
            background: #667eea; color: #fff; border: none; border-radius: 6px;
            padding: 5px 12px; font-size: .78rem; cursor: pointer; font-weight: 500;
        }
        .btn-detail:hover { background: #5a68c9; color: #fff; }

        .detail-row td { background: #f8fafc; padding: 12px 20px !important; }
        .detail-section { margin-bottom: 12px; }
        .detail-section-title {
            font-size: .82rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-section-title i { font-size: .75rem; }
        .detail-table { width: 100%; margin: 0; border-collapse: collapse; }
        .detail-table th {
            padding: 5px 10px;
            font-size: .75rem;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }
        .detail-table td { padding: 5px 10px; font-size: .82rem; border-bottom: 1px solid #f1f5f9; }
        .detail-table .lbl { color: #64748b; font-weight: 500; width: 120px; }
        .detail-total { font-weight: 700; color: #16a34a; }

        .sk-row { height: 44px; background: #f1f5f9; border-radius: 6px; margin-bottom: 8px; animation: skPulse 1.4s ease-in-out infinite; }
        @keyframes skPulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    </style>
</head>
<body>
    <div id="app-sidebar"></div>
    <main class="main-content" id="mainContent">
        <div id="app-navbar"></div>
        <div class="dashboard-content">
            <div class="invoice-card">
                <div class="card-title">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span class="lang-content" data-en="Due Invoices" data-bn="ডিউ ইনভয়েস">ডিউ ইনভয়েস</span>
                </div>

                <!-- Summary -->
                <div class="summary-bar">
                    <div class="summary-item">
                        <label class="lang-content" data-en="Total Due Invoices" data-bn="মোট ডিউ ইনভয়েস">মোট ডিউ ইনভয়েস</label>
                        <span class="val" id="totalDueCount">0</span>
                    </div>
                    <div class="summary-item">
                        <label class="lang-content" data-en="Total Due Amount" data-bn="মোট বাকি টাকা">মোট বাকি টাকা</label>
                        <span class="val" id="totalDueAmount">৳0</span>
                    </div>
                    <div class="summary-item paid-bg">
                        <label class="lang-content" data-en="Total Paid" data-bn="মোট পরিশোধিত">মোট পরিশোধিত</label>
                        <span class="val" id="totalPaidAmount">৳0</span>
                    </div>
                </div>

                <!-- Skeleton -->
                <div id="skeletonLoader">
                    <div class="sk-row"></div><div class="sk-row"></div><div class="sk-row"></div>
                </div>

                <!-- Table -->
                <div style="overflow-x:auto; display:none;" id="tableWrap">
                    <table class="inv-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th><span class="lang-content" data-en="Invoice For" data-bn="ইনভয়েস বিবরণ">ইনভয়েস বিবরণ</span></th>
                                <th><span class="lang-content" data-en="Issue Date" data-bn="ইস্যু তারিখ">ইস্যু তারিখ</span></th>
                                <th><span class="lang-content" data-en="End Date" data-bn="শেষ তারিখ">শেষ তারিখ</span></th>
                                <th><span class="lang-content" data-en="Total" data-bn="মোট">মোট</span></th>
                                <th><span class="lang-content" data-en="Discount" data-bn="ছাড়">ছাড়</span></th>
                                <th><span class="lang-content" data-en="Paid" data-bn="জমা">জমা</span></th>
                                <th><span class="lang-content" data-en="Due" data-bn="বাকি">বাকি</span></th>
                                <th><span class="lang-content" data-en="Status" data-bn="অবস্থা">অবস্থা</span></th>
                                <th><span class="lang-content" data-en="Details" data-bn="বিস্তারিত">বিস্তারিত</span></th>
                            </tr>
                        </thead>
                        <tbody id="invoiceBody"></tbody>
                    </table>
                </div>

                <!-- Empty state -->
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="fas fa-check-circle"></i>
                    <p class="lang-content" data-en="No due invoices found. All payments are up to date!" data-bn="কোনো বাকি ইনভয়েস নেই। সব পেমেন্ট হয়ে গেছে!">কোনো বাকি ইনভয়েস নেই। সব পেমেন্ট হয়ে গেছে!</p>
                </div>
            </div>
        </div>
    </main>

    <div id="app-modals"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js"></script>
    <script>
    $(document).ready(function() {
        var institutionId = sessionStorage.getItem('institutionId');
        if (!institutionId) { window.location.href = '/login.html'; return; }

        loadInvoices(institutionId, 'Due');
    });

    function loadInvoices(institutionId, status) {
        $.ajax({
            url: '/api/invoice/list?institutionId=' + institutionId + '&status=' + status + '&pageSize=100',
            method: 'GET',
            success: function(r) {
                $('#skeletonLoader').hide();
                if (r.success && r.data && r.data.length) {
                    renderInvoices(r.data);
                    $('#tableWrap').show();
                } else {
                    $('#emptyState').show();
                }
            },
            error: function() {
                $('#skeletonLoader').hide();
                $('#emptyState').show();
            }
        });
    }

    function renderInvoices(invoices) {
        var $body = $('#invoiceBody');
        $body.empty();

        var totalDue = 0, totalPaid = 0, count = 0;
        var fmt = function(n) { return (n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 }); };
        var fmtDate = function(d) {
            if (!d) return '-';
            var dt = new Date(d);
            return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        invoices.forEach(function(inv, idx) {
            var total = inv.totalAmount || 0;
            var discount = inv.discount || 0;
            var paid = inv.paidAmount || 0;
            var due = total - discount - paid;
            if (due < 0) due = 0;

            totalDue += due;
            totalPaid += paid;
            count++;

            var statusBadge = inv.paymentStatus === 'Due'
                ? '<span class="badge-due">ডিউ</span>'
                : '<span class="badge-partial">আংশিক</span>';

            var row = '<tr>' +
                '<td>' + (idx + 1) + '</td>' +
                '<td>' + (inv.invoice_For || '-') + '</td>' +
                '<td>' + fmtDate(inv.issuDate) + '</td>' +
                '<td>' + fmtDate(inv.endDate) + '</td>' +
                '<td>৳' + fmt(total) + '</td>' +
                '<td>৳' + fmt(discount) + '</td>' +
                '<td>৳' + fmt(paid) + '</td>' +
                '<td><strong style="color:#dc2626;">৳' + fmt(due) + '</strong></td>' +
                '<td>' + statusBadge + '</td>' +
                '<td><button class="btn-detail" onclick="toggleDetail(this,' + inv.invoiceID + ')"><i class="fas fa-eye me-1"></i><span class="lang-content" data-en="View" data-bn="দেখুন">দেখুন</span></button></td>' +
                '</tr>';
            $body.append(row);
        });

        $('#totalDueCount').text(count);
        $('#totalDueAmount').text('৳' + fmt(totalDue));
        $('#totalPaidAmount').text('৳' + fmt(totalPaid));
    }

    function toggleDetail(btn, invoiceId) {
        var $tr = $(btn).closest('tr');
        var $next = $tr.next('.detail-row');
        if ($next.length) {
            $next.remove();
            return;
        }

        var fmt = function(n) { return (n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 }); };
        var fmtDate = function(d) {
            if (!d) return '-';
            var dt = new Date(d);
            return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        $.ajax({
            url: '/api/invoice/' + invoiceId + '/detail',
            method: 'GET',
            success: function(r) {
                if (!r.success) return;

                var html = '<tr class="detail-row"><td colspan="10"><div style="padding:4px 0;">';

                // Invoice Lines section
                if (r.lines && r.lines.length) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title"><i class="fas fa-file-alt"></i> ইনভয়েস বিবরণ</div>';
                    html += '<table class="detail-table"><thead><tr><th>বিবরণ</th><th>টাকা</th></tr></thead><tbody>';
                    r.lines.forEach(function(line) {
                        html += '<tr><td>' + (line.details || '-') + '</td><td>৳' + fmt(line.amount) + '</td></tr>';
                    });
                    html += '</tbody></table></div>';
                }

                // Payment Records section
                if (r.payments && r.payments.length) {
                    var totalPaid = 0;
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title"><i class="fas fa-money-bill-wave"></i> পেমেন্ট রেকর্ড</div>';
                    html += '<table class="detail-table"><thead><tr><th>তারিখ</th><th>টাকা</th><th>মাধ্যম</th><th>আদায়কারী</th></tr></thead><tbody>';
                    r.payments.forEach(function(pay) {
                        totalPaid += (pay.amount || 0);
                        html += '<tr>' +
                            '<td>' + fmtDate(pay.paidDate) + '</td>' +
                            '<td>৳' + fmt(pay.amount) + '</td>' +
                            '<td>' + (pay.payment_Method || '-') + '</td>' +
                            '<td>' + (pay.collected_By || '-') + '</td>' +
                            '</tr>';
                    });
                    html += '<tr><td><strong>মোট পেইড</strong></td><td class="detail-total">৳' + fmt(totalPaid) + '</td><td></td><td></td></tr>';
                    html += '</tbody></table></div>';
                }

                if ((!r.lines || !r.lines.length) && (!r.payments || !r.payments.length)) {
                    html += '<div style="color:#94a3b8; font-size:.82rem;">কোনো বিবরণ নেই</div>';
                }

                html += '</div></td></tr>';
                $tr.after(html);
            },
            error: function() {
                var html = '<tr class="detail-row"><td colspan="10" style="color:#dc2626; font-size:.82rem;">ডাটা লোড করতে সমস্যা হয়েছে</td></tr>';
                $tr.after(html);
            }
        });
    }
    </script>
</body>
</html>
