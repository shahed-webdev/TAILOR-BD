<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - প্রবেশাধিকার নেই | TailorBD</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Bengali', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Animated background shapes */
        .shape {
            position: absolute;
            opacity: 0.1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 50%;
            top: -150px;
            left: -150px;
            animation: float 6s ease-in-out infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite reverse;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            top: 50%;
            right: 10%;
            animation: float 7s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 60px 50px;
            border-radius: 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-icon {
            font-size: 100px;
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 5px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
            opacity: 0.95;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.4);
        }

        .support-info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0.8;
        }

        .support-info i {
            margin-right: 8px;
        }

        /* Language toggle */
        .lang-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }

            .error-code {
                font-size: 80px;
            }

            h1 {
                font-size: 28px;
            }

            h2 {
                font-size: 22px;
            }

            p {
                font-size: 16px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .lang-toggle {
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Background shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <!-- Language Toggle -->
    <button class="lang-toggle" onclick="toggleLanguage()">
        <i class="fas fa-language"></i>
        <span id="langText">বাংলা</span>
    </button>

    <div class="container">
        <div class="lock-icon">
            <i class="fas fa-lock"></i>
        </div>

        <div class="error-code">403</div>

        <h1 class="lang-content" data-en="Access Denied" data-bn="প্রবেশাধিকার নেই">
            প্রবেশাধিকার নেই
        </h1>

        <h2 class="lang-content" data-en="You don't have permission" data-bn="আপনার অনুমতি নেই">
            আপনার অনুমতি নেই
        </h2>

        <p class="lang-content" 
           data-en="You don't have permission to access this page. Please contact your administrator to get access." 
           data-bn="আপনার এই পেজে প্রবেশের অনুমতি নেই। অ্যাক্সেস পেতে অনুগ্রহ করে আপনার অ্যাডমিনিস্ট্রেটরের সাথে যোগাযোগ করুন।">
            আপনার এই পেজে প্রবেশের অনুমতি নেই। অ্যাক্সেস পেতে অনুগ্রহ করে আপনার অ্যাডমিনিস্ট্রেটরের সাথে যোগাযোগ করুন।
        </p>

        <div class="buttons">
            <a href="/dashboard.html" class="btn btn-primary">
                <i class="fas fa-home"></i>
                <span class="lang-content" data-en="Go to Dashboard" data-bn="ড্যাশবোর্ডে ফিরুন">
                    ড্যাশবোর্ডে ফিরুন
                </span>
            </a>

            <a href="javascript:history.back()" class="btn">
                <i class="fas fa-arrow-left"></i>
                <span class="lang-content" data-en="Go Back" data-bn="পেছনে যান">
                    পেছনে যান
                </span>
            </a>
        </div>

        <div class="support-info">
            <p>
                <i class="fas fa-phone"></i>
                <span class="lang-content" data-en="Support: +88 01739144141" data-bn="সাপোর্ট: +৮৮ ০১৭৩৯১৪৪১৪১">
                    সাপোর্ট: +৮৮ ০১৭৩৯১৪৪১৪১
                </span>
            </p>
        </div>
    </div>

    <script>
        // Language Toggle
        let currentLang = 'bn'; // Default to Bengali

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'bn' : 'en';
            updateLanguage();
        }

        function updateLanguage() {
            const langText = currentLang === 'en' ? 'বাংলা' : 'English';
            document.getElementById('langText').textContent = langText;
            
            document.querySelectorAll('.lang-content').forEach(element => {
                const text = element.getAttribute('data-' + currentLang);
                
                if (element.tagName === 'A' || element.tagName === 'SPAN') {
                    // For links and spans, preserve the icon
                    const icon = element.querySelector('i');
                    if (icon) {
                        element.innerHTML = icon.outerHTML + ' ' + text;
                    } else {
                        element.textContent = text;
                    }
                } else {
                    element.textContent = text;
                }
            });

            localStorage.setItem('preferredLanguage', currentLang);
        }

        // Load saved language preference
        window.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferredLanguage');
            if (savedLang) {
                currentLang = savedLang;
                updateLanguage();
            }
        });

        // Add some extra animation on page load
        window.addEventListener('load', function() {
            document.querySelector('.container').style.animation = 'slideIn 0.6s ease-out';
        });
    </script>
</body>
</html>
