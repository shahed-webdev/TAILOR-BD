<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Purchase Return - TailorBD" data-bn="ক্রয় ফেরত - TailorBD">ক্রয় ফেরত - TailorBD</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        #app-navbar { margin-left:260px; transition:margin-left .3s ease; }
        .page-container { width:100%; padding:16px 24px; }
        @media(max-width:992px){ #app-navbar{margin-left:0;} .main-content{margin-left:0;} .page-container{padding:10px;} }

        .return-layout { display:grid; grid-template-columns:1fr 300px; gap:20px; align-items:start; }
        @media(max-width:992px){ .return-layout{grid-template-columns:1fr;} }

        .card-box { background:#fff; border-radius:10px; padding:20px; box-shadow:0 2px 10px rgba(0,0,0,.07); margin-bottom:18px; }
        .card-title { font-size:14px; font-weight:700; color:#e74c3c; margin-bottom:14px; display:flex; align-items:center; gap:8px; border-bottom:2px solid #fde8e8; padding-bottom:10px; }

        .f-label { font-size:12.5px; font-weight:500; color:#555; margin-bottom:4px; display:block; }
        .f-control { width:100%; padding:8px 11px; border:1px solid #ddd; border-radius:6px; font-size:13.5px; font-family:inherit; box-sizing:border-box; transition:border-color .2s; }
        .f-control:focus { outline:none; border-color:#e74c3c; box-shadow:0 0 0 3px rgba(231,76,60,.1); }
        .req { color:#dc3545; }

        /* Autocomplete */
        .autocomplete-wrap { position:relative; }
        .autocomplete-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #ddd; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,.12); z-index:999; max-height:240px; overflow-y:auto; display:none; }
        .autocomplete-item { padding:9px 13px; cursor:pointer; border-bottom:1px solid #f5f5f5; font-size:13px; }
        .autocomplete-item:hover { background:#fff5f5; }

        /* Purchase info badge */
        .purchase-badge { background:#fff5f5; border-radius:7px; padding:10px 14px; font-size:13px; border-left:3px solid #e74c3c; display:none; margin-top:8px; }

        /* Items Table */
        .items-tbl { width:100%; border-collapse:collapse; }
        .items-tbl thead th { background:#fff5f5; padding:9px 10px; font-size:12px; font-weight:700; color:#555; border-bottom:2px solid #fde8e8; text-align:center; white-space:nowrap; }
        .items-tbl tbody tr { border-bottom:1px solid #f5f5f5; }
        .items-tbl tbody tr:hover { background:#fffafa; }
        .items-tbl tbody td { padding:8px 10px; font-size:13px; vertical-align:middle; text-align:center; }
        .ret-input { width:100px; padding:5px 8px; border:1px solid #ddd; border-radius:5px; font-size:13px; text-align:right; font-family:inherit; }
        .ret-input:focus { outline:none; border-color:#e74c3c; }
        .ret-input:disabled { background:#f5f5f5; cursor:not-allowed; }
        .already-ret { font-size:11px; color:#e67e22; }
        .max-lbl { font-size:11px; color:#888; }

        /* Right Panel */
        .btn-submit { padding:10px; background:#e74c3c; color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s; }
        .btn-submit:hover { background:#c0392b; }
        .btn-submit:disabled { background:#aaa; cursor:not-allowed; }
        .sum-row { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; }
        .sum-row label { color:#666; }
        .sum-val { font-weight:700; color:#e74c3c; }

        /* Records Table */
        .rec-tbl { width:100%; border-collapse:collapse; }
        .rec-tbl thead th { background:#fff5f5; padding:9px 10px; font-size:12px; font-weight:700; color:#555; border-bottom:2px solid #fde8e8; text-align:center; white-space:nowrap; }
        .rec-tbl tbody td { padding:8px 10px; font-size:13px; text-align:center; border-bottom:1px solid #f5f5f5; vertical-align:middle; }

        /* Toast & Alert */
        .toast-notify { position:fixed; top:20px; right:24px; z-index:9999; min-width:280px; padding:12px 18px; border-radius:8px; font-size:14px; font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,.15); display:none; align-items:center; gap:10px; }
        .toast-notify.success { background:#d4edda; color:#155724; border-left:4px solid #28a745; }
        .toast-notify.error   { background:#f8d7da; color:#721c24; border-left:4px solid #dc3545; }
        .alert-box { padding:9px 13px; border-radius:6px; font-size:13px; display:none; margin-top:8px; }
        .alert-box.error   { background:#f8d7da; color:#721c24; }
        .alert-box.success { background:#d4edda; color:#155724; }

        .spin-wrap { text-align:center; padding:30px; color:#aaa; }
        .spin { width:28px; height:28px; border:3px solid #fde8e8; border-top-color:#e74c3c; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .spinner-sm { width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
        .empty-state { text-align:center; padding:30px; color:#bbb; font-size:13px; }
    </style>
</head>
<body>
    <div id="app-navbar"></div>
    <div id="app-sidebar"></div>
    <div id="app-modals"></div>

    <main class="main-content" id="mainContent">
        <div class="dashboard-content">
            <div class="page-container">

                <h5 style="font-weight:700; color:#e74c3c; margin-bottom:16px;">
                    <i class="fas fa-undo-alt me-2"></i>
                    <span data-en="Purchase Return" data-bn="ক্রয় ফেরত">ক্রয় ফেরত</span>
                </h5>

                <div class="return-layout">

                    <!-- LEFT -->
                    <div>

                        <!-- Step 1: Purchase খোঁজো -->
                        <div class="card-box">
                            <div class="card-title">
                                <i class="fas fa-search"></i>
                                <span data-en="Step 1: Find Purchase by SN" data-bn="ধাপ ১: ক্রয় নম্বর দিয়ে খুঁজুন">ধাপ ১: ক্রয় নম্বর দিয়ে খুঁজুন</span>
                            </div>
                            <div class="autocomplete-wrap">
                                <input type="text" id="buyingSnSearch" class="f-control"
                                    placeholder="ক্রয় নম্বর লিখুন বা বারকোড স্ক্যান করুন..."
                                    data-en-placeholder="Type or scan barcode..."
                                    data-bn-placeholder="ক্রয় নম্বর লিখুন বা বারকোড স্ক্যান করুন..."
                                    autocomplete="off"
                                    oninput="searchBuyingSN(this.value)"
                                    onkeydown="onSnKeyDown(event)">
                                <div class="autocomplete-list" id="buyingSnList"></div>
                            </div>
                            <div class="purchase-badge" id="purchaseBadge"></div>
                            <input type="hidden" id="selectedBuyingID" value="0">
                            <input type="hidden" id="selectedSupplierID" value="0">
                        </div>

                        <!-- Step 2: Items Table -->
                        <div class="card-box" id="itemsSection" style="display:none;">
                            <div class="card-title">
                                <i class="fas fa-list-ul"></i>
                                <span data-en="Step 2: Select Return Quantity" data-bn="ধাপ ২: ফেরতের পরিমান দিন">ধাপ ২: ফেরতের পরিমান দিন</span>
                            </div>
                            <div style="overflow-x:auto;">
                                <table class="items-tbl">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th><span data-en="Code" data-bn="কোড">কোড</span></th>
                                            <th><span data-en="Item Name" data-bn="আইটেমের নাম">আইটেমের নাম</span></th>
                                            <th><span data-en="Bought Qty" data-bn="ক্রয় পরিমান">ক্রয় পরিমান</span></th>
                                            <th><span data-en="Already Returned" data-bn="আগে ফেরত">আগে ফেরত</span></th>
                                            <th><span data-en="Current Stock" data-bn="বর্তমান স্টক">বর্তমান স্টক</span></th>
                                            <th><span data-en="Unit Price" data-bn="ইউনিট মূল্য">ইউনিট মূল্য</span></th>
                                            <th><span data-en="Return Qty" data-bn="ফেরত পরিমান">ফেরত পরিমান</span></th>
                                            <th><span data-en="Return Value" data-bn="ফেরতের মূল্য">ফেরতের মূল্য</span></th>
                                        </tr>
                                    </thead>
                                    <tbody id="buyingItemsBody"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Return History -->
                        <div class="card-box">
                            <div class="card-title">
                                <i class="fas fa-history"></i>
                                <span data-en="Return History" data-bn="ফেরতের ইতিহাস">ফেরতের ইতিহাস</span>
                            </div>
                            <div id="recLoadWrap" class="spin-wrap"><div class="spin"></div></div>
                            <div id="recTableWrap" style="display:none; overflow-x:auto;">
                                <table class="rec-tbl">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th><span data-en="Date" data-bn="তারিখ">তারিখ</span></th>
                                            <th><span data-en="Purchase SN" data-bn="ক্রয় নং">ক্রয় নং</span></th>
                                            <th><span data-en="Code" data-bn="কোড">কোড</span></th>
                                            <th><span data-en="Item Name" data-bn="আইটেম">আইটেম</span></th>
                                            <th><span data-en="Return Qty" data-bn="ফেরত পরিমান">ফেরত পরিমান</span></th>
                                            <th><span data-en="Supplier" data-bn="সাপ্লায়ার">সাপ্লায়ার</span></th>
                                        </tr>
                                    </thead>
                                    <tbody id="recBody"></tbody>
                                </table>
                            </div>
                            <div id="recEmpty" class="empty-state" style="display:none;">
                                <i class="fas fa-inbox me-2"></i>
                                <span data-en="No return records" data-bn="কোনো ফেরতের রেকর্ড নেই">কোনো ফেরতের রেকর্ড নেই</span>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT -->
                    <div>
                        <div class="card-box">
                            <div class="card-title">
                                <i class="fas fa-receipt"></i>
                                <span data-en="Return Summary" data-bn="ফেরতের সারসংক্ষেপ">ফেরতের সারসংক্ষেপ</span>
                            </div>

                            <div class="sum-row">
                                <label><span data-en="Return Items" data-bn="ফেরতের আইটেম">ফেরতের আইটেম</span></label>
                                <span class="sum-val" id="sumItems">0</span>
                            </div>
                            <div class="sum-row">
                                <label><span data-en="Total Qty" data-bn="মোট পরিমান">মোট পরিমান</span></label>
                                <span class="sum-val" id="sumQty">0</span>
                            </div>
                            <div class="sum-row">
                                <label><span data-en="Total Return Value" data-bn="মোট ফেরতের মূল্য">মোট ফেরতের মূল্য</span></label>
                                <span class="sum-val" style="font-size:16px;color:#e74c3c;">৳ <span id="sumValue">0.00</span></span>
                            </div>

                            <hr style="border-color:#fde8e8; margin:12px 0;">

                            <div class="mb-3">
                                <label class="f-label">
                                    <span data-en="Return Date" data-bn="ফেরতের তারিখ">ফেরতের তারিখ</span>
                                    <span class="req">*</span>
                                </label>
                                <input type="date" id="retDate" class="f-control">
                            </div>

                            <button class="btn-submit" onclick="submitReturn()">
                                <i class="fas fa-check-circle"></i>
                                <span data-en="Complete Return" data-bn="ফেরত সম্পন্ন করুন">ফেরত সম্পন্ন করুন</span>
                            </button>
                            <div class="alert-box" id="retAlert"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="toast-notify" id="pageToast"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-components.js"></script>
    <script src="/js/item-purchase-return.js"></script>
</body>
</html>
