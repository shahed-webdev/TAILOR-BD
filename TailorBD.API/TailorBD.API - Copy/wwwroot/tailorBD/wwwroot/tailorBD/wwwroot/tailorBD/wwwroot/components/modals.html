<!-- Update Info Modal -->
<div class="modal fade" id="updateInfoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title lang-content" data-en="Update Profile Information" data-bn="আপনার তথ্য আপডেট করুন">Update Profile Information</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="updateInfoForm">
                    <div class="mb-3 text-center">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=667eea&color=fff&size=120&bold=true" 
                             alt="Profile" class="rounded-circle mb-3" id="modalProfileImage" style="width: 120px; height: 120px;">
                        <div>
                            <input type="file" class="form-control" id="profileImageInput" accept="image/*">
                            <small class="text-muted lang-content" data-en="Upload profile picture (JPG, PNG)" data-bn="প্রোফাইল ছবি আপলোড করুন (JPG, PNG)">Upload profile picture</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Full Name" data-bn="পুরো নাম">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Designation" data-bn="পদবী">Designation</label>
                        <input type="text" class="form-control" id="profileDesignation">
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Email" data-bn="ই-মেইল">Email</label>
                        <input type="email" class="form-control" id="profileEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Phone" data-bn="ফোন">Phone</label>
                        <input type="tel" class="form-control" id="profilePhone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Address" data-bn="ঠিকানা">Address</label>
                        <textarea class="form-control" id="profileAddress" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <span class="lang-content" data-en="Close" data-bn="বন্ধ করুন">Close</span>
                </button>
                <button type="button" class="btn btn-primary" onclick="updateProfile()">
                    <i class="fas fa-save me-2"></i>
                    <span class="lang-content" data-en="Save Changes" data-bn="পরিবর্তন সংরক্ষণ করুন">Save Changes</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Change Password Modal -->
<div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title lang-content" data-en="Change Password" data-bn="পাসওয়ার্ড পরিবর্তন করুন">Change Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="changePasswordForm">
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Current Password" data-bn="বর্তমান পাসওয়ার্ড">Current Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="currentPassword" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordField('currentPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="New Password" data-bn="নতুন পাসওয়ার্ড">New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordField('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="text-muted lang-content" data-en="Minimum 6 characters" data-bn="সর্বনিম্ন ৬টি অক্ষর">Minimum 6 characters</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label lang-content" data-en="Confirm New Password" data-bn="নতুন পাসওয়ার্ড নিশ্চিত করুন">Confirm New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordField('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div id="passwordError" class="alert alert-danger" style="display: none;"></div>
                    <div id="passwordSuccess" class="alert alert-success" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <span class="lang-content" data-en="Cancel" data-bn="বাতিল">Cancel</span>
                </button>
                <button type="button" class="btn btn-primary" onclick="changePassword()">
                    <i class="fas fa-key me-2"></i>
                    <span class="lang-content" data-en="Change Password" data-bn="পাসওয়ার্ড পরিবর্তন">Change Password</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal fade" id="logoutConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fas fa-sign-out-alt me-2"></i>
                    <span class="lang-content" data-en="Confirm Logout" data-bn="লগআউট নিশ্চিত করুন">লগআউট নিশ্চিত করুন</span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="fas fa-exclamation-triangle text-warning" style="font-size: 64px; margin-bottom: 20px;"></i>
                <h5 class="lang-content" data-en="Are you sure you want to logout?" data-bn="আপনি কি লগ আউট করতে চান?">
                    আপনি কি লগ আউট করতে চান?
                </h5>
                <p class="text-muted lang-content" 
                   data-en="You will need to login again to access the system." 
                   data-bn="সিস্টেম অ্যাক্সেস করতে আপনাকে আবার লগইন করতে হবে।">
                    সিস্টেম অ্যাক্সেস করতে আপনাকে আবার লগইন করতে হবে。
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times me-2"></i>
                    <span class="lang-content" data-en="Cancel" data-bn="বাতিল">বাতিল</span>
                </button>
                <button type="button" class="btn btn-danger" onclick="confirmLogout()">
                    <i class="fas fa-sign-out-alt me-2"></i>
                    <span class="lang-content" data-en="Yes, Logout" data-bn="হ্যাঁ, লগআউট">হ্যাঁ, লগআউট</span>
                </button>
            </div>
        </div>
    </div>
</div>
