<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TailorBD | টেইলরবিডি লগইন</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/lib/fontawesome/css/all.min.css">
    <!-- Custom CSS -->
    <link href="/css/login.css" rel="stylesheet">
    <!-- Auth utility -->
    <script src="/js/auth.js"></script>
</head>
<body>
    <button class="lang-toggle" onclick="toggleLanguage()">
        <i class="fas fa-language"></i> <span id="langText">বাংলা</span>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-cut"></i>
                <h2 class="lang-content" data-en="Welcome Back" data-bn="স্বাগতম">Welcome Back</h2>
                <p class="lang-content" data-en="Login to your TailorBD account" data-bn="আপনার টেইলরবিডি অ্যাকাউন্টে লগইন করুন">Login to your TailorBD account</p>
            </div>

            <div class="login-body">
                <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label lang-content" data-en="Username" data-bn="ইউজারনেম">Username</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-control" id="username" name="username" required 
                                   placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label lang-content" data-en="Password" data-bn="পাসওয়ার্ড">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="password" name="password" required 
                                   placeholder="Enter your password">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-login lang-content" data-en="Login" data-bn="লগইন">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="mt-3 lang-content" data-en="Logging in..." data-bn="লগইন হচ্ছে...">Logging in...</p>
                </div>

                <div class="links">
                    <p class="lang-content" data-en="Forgot your password?" data-bn="পাসওয়ার্ড ভুলে গেছেন?">Forgot your password?</p>
                    <p class="lang-content" data-en="Contact Support: +88 01739144141" data-bn="সহায়তা যোগাযোগ: +৮৮ ০১৭৩৯১৪৪১৪১">Contact Support: +88 01739144141</p>
                </div>
            </div>
        </div>

        <div class="back-home">
            <a href="/">
                <i class="fas fa-arrow-left"></i>
                <span class="lang-content" data-en="Back to Home" data-bn="হোমে ফিরে যান">Back to Home</span>
            </a>
        </div>
    </div>

    <script src="/lib/jquery/jquery.min.js"></script>
    <script src="/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Language Toggle
        let currentLang = 'en';
        
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'bn' : 'en';
            updateLanguage();
        }

        function updateLanguage() {
            const langText = currentLang === 'en' ? 'বাংলা' : 'English';
            $('#langText').text(langText);
            
            $('.lang-content').each(function() {
                const text = $(this).attr('data-' + currentLang);
                if ($(this).is('input') || $(this).is('button')) {
                    if($(this).is('button')) {
                        const icon = $(this).find('i').prop('outerHTML');
                        $(this).html(icon + ' ' + text);
                    } else {
                        $(this).attr('placeholder', text);
                    }
                } else {
                    $(this).text(text);
                }
            });

            localStorage.setItem('preferredLanguage', currentLang);
        }

        // Load saved language preference
        $(document).ready(function() {
            const savedLang = localStorage.getItem('preferredLanguage');
            if (savedLang) {
                currentLang = savedLang;
                updateLanguage();
            }

            // Check if there's a message in URL
            const urlParams = new URLSearchParams(window.location.search);
            const invalid = urlParams.get('Invalid');
            if (invalid) {
                showError(invalid);
            }
        });

        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Form Submission
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            const username = $('#username').val().trim();
            const password = $('#password').val();

            if (!username || !password) {
                showError(currentLang === 'en' ? 'Please enter username and password' : 'দয়া করে ইউজারনেম এবং পাসওয়ার্ড দিন');
                return;
            }

            // Show loading
            $('#loginForm').hide();
            $('#loading').show();
            hideMessages();

            authenticateUser(username, password);
        });

        function authenticateUser(username, password) {
            console.log('Attempting login for:', username);
            
            // API call to ASP.NET backend
            $.ajax({
                url: '/api/auth/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username: username, password: password }),
                success: function(response) {
                    console.log('Login response:', response);
                    
                    if (response.success) {
                        showSuccess(currentLang === 'en' ? 'Login successful! Redirecting...' : 'লগইন সফল! রিডাইরেক্ট করা হচ্ছে...');
                        
                        // Store user info — TailorAuth.set() writes to both
                        // sessionStorage AND the localStorage mirror simultaneously,
                        // so any page can restore the session after navigation.
                        TailorAuth.set('username',       response.data.username);
                        TailorAuth.set('name',           response.data.name || response.data.username);
                        TailorAuth.set('registrationId', response.data.registrationId);
                        TailorAuth.set('institutionId',  response.data.institutionId);
                        TailorAuth.set('institutionName',response.data.institutionName);
                        TailorAuth.set('category',       response.data.category || 'User');
                        TailorAuth.set('isLoggedIn',     'true');
                        
                        console.log('Session data stored:', {
                            username: response.data.username,
                            name: response.data.name || response.data.username,
                            registrationId: response.data.registrationId,
                            institutionId: response.data.institutionId,
                            institutionName: response.data.institutionName,
                            category: response.data.category || 'User',
                            isLoggedIn: 'true'
                        });

                        // Redirect based on user category
                        const category = response.data.category;
                        
                        if (category === 'Authority') {
                            // Authority goes to their own panel
                            setTimeout(() => {
                                window.location.href = '/authority-profile.html';
                            }, 1500);
                        } else if (category === 'Admin') {
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 1500);
                        } else if (category === 'Sub-Authority') {
                            setTimeout(() => {
                                window.location.href = '/authority-sub-profile.html';
                            }, 1500);
                        } else if (category === 'Sub-Admin') {
                            setTimeout(() => {
                                window.location.href = '/sub-admin-dashboard.html';
                            }, 1500);
                        } else {
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 1500);
                        }
                    } else {
                        console.error('Login failed:', response.message);
                        showError(response.message);
                        $('#loading').hide();
                        $('#loginForm').show();
                    }
                },
                error: function(xhr) {
                    console.error('Login error:', xhr);
                    console.error('Response text:', xhr.responseText);
                    console.error('Status:', xhr.status);
                    showError(currentLang === 'en' ? 'Login failed. Please try again.' : 'লগইন ব্যর্থ। আবার চেষ্টা করুন।');
                    $('#loading').hide();
                    $('#loginForm').show();
                }
            });
        }

        function showError(message) {
            $('#errorMessage').text(message).show();
            setTimeout(() => {
                $('#errorMessage').fadeOut();
            }, 5000);
        }

        function showSuccess(message) {
            $('#successMessage').text(message).show();
        }

        function hideMessages() {
            $('#errorMessage').hide();
            $('#successMessage').hide();
        }

        // Enter key support
        $('#password').on('keypress', function(e) {
            if (e.which === 13) {
                $('#loginForm').submit();
            }
        });
    </script>
</body>
</html>
